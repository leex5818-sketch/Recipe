<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="성원포차"/>
  <meta name="theme-color" content="#C0392B"/>
  <title>성원포차 레시피</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.svg"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:#F7F7F9}
    ::-webkit-scrollbar{display:none}
    body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
    #root{height:100%}
    button,input,textarea,select{outline:none;font-family:inherit}
    .fade{animation:fu .25s ease forwards}
    @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;

// ── Supabase 설정 ─────────────────────────────────────────
const SB_URL="https://clidlcwqpddzgjgjznea.supabase.co";
const SB_KEY="sb_publishable_4Fyvj0W8RGpzTHhwcgnzSA_9tAjFQ-0";
const ADMIN_PW="sungwon2024"; // 관리자 비밀번호 (나중에 변경 가능)

const sbFetch=(path,opt={})=>fetch(`${SB_URL}/rest/v1/${path}`,{
  headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,...(opt.headers||{})},
  ...opt
});

// ── 상수 ─────────────────────────────────────────────────
const BC={
  인기:{bg:"#FFF0E0",c:"#E67E22"},건강:{bg:"#E8F8F5",c:"#27AE60"},간단:{bg:"#EBF5FB",c:"#2980B9"},
  정통:{bg:"#F4ECF7",c:"#8E44AD"},고급:{bg:"#FEF9E7",c:"#B7950B"},시그니처:{bg:"#FDEDEC",c:"#922B21"},
  강추:{bg:"#FFF0E0",c:"#E8412A"},특선:{bg:"#FEF9E7",c:"#CA6F1E"},매운맛:{bg:"#FDEDEC",c:"#E74C3C"},
  신선:{bg:"#EAFAF1",c:"#1E8449"},시원함:{bg:"#EBF5FB",c:"#1A5276"},겨울:{bg:"#F4ECF7",c:"#8E44AD"},
  여름:{bg:"#EBF5FB",c:"#2980B9"},브런치:{bg:"#F5EEF8",c:"#8E44AD"},와인:{bg:"#FDEDEC",c:"#922B21"},
  초기:{bg:"#EAF7EF",c:"#27AE60"},중기:{bg:"#EAF7EF",c:"#1E8449"},후기:{bg:"#EAF7EF",c:"#196F3D"},
  완료기:{bg:"#EAF7EF",c:"#145A32"},명절:{bg:"#FEF9E7",c:"#B7950B"},
};
const DIFF=["","★ 쉬움","★★ 보통","★★★ 보통+","★★★★ 어려움","★★★★★ 고급"];
const LS={
  get:(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

const Stars=({v,onChange,size=20})=>(
  <div style={{display:"flex",gap:2}}>
    {[1,2,3,4,5].map(s=>(
      <span key={s} onClick={()=>onChange?.(s)} style={{fontSize:size,cursor:onChange?"pointer":"default",color:s<=v?"#F39C12":"#DDD",lineHeight:1}}>★</span>
    ))}
  </div>
);

// ─────────────────────────────────────────────────────────
export default function App(){
  const [db,setDb]=useState(null);
  const [loading,setLoading]=useState(true);
  const [cat,setCat]=useState(null);
  const [dish,setDish]=useState(null);
  const [recipe,setRecipe]=useState(null);
  const [step,setStep]=useState(null);
  const [tab,setTab]=useState("home");
  const [query,setQuery]=useState("");
  const [favs,setFavs]=useState(()=>LS.get("spa_favs",[]));
  const [ratings,setRatings]=useState(()=>LS.get("spa_ratings",{}));
  // 수정 요청 모달
  const [editModal,setEditModal]=useState(null); // {recipe, field, original}
  const [editValue,setEditValue]=useState("");
  const [editReason,setEditReason]=useState("");
  const [editSending,setEditSending]=useState(false);
  const [editDone,setEditDone]=useState(false);
  // 관리자
  const [adminMode,setAdminMode]=useState(false);
  const [adminPw,setAdminPw]=useState("");
  const [adminRequests,setAdminRequests]=useState([]);
  const [adminLoading,setAdminLoading]=useState(false);
  // 후기
  const [reviewModal,setReviewModal]=useState(null);
  const [draftStar,setDraftStar]=useState(0);
  const [draftNote,setDraftNote]=useState("");
  const searchRef=useRef(null);

  // recipes.json 로드
  useEffect(()=>{
    fetch("./recipes.json")
      .then(r=>r.json())
      .then(data=>setDb(data))
      .catch(()=>setDb(null))
      .finally(()=>setLoading(false));
  },[]);

  useEffect(()=>{LS.set("spa_favs",favs);},[favs]);
  useEffect(()=>{LS.set("spa_ratings",ratings);},[ratings]);

  if(loading) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#F7F7F9",flexDirection:"column",gap:12}}>
      <div style={{fontSize:48}}>🍶</div>
      <p style={{fontSize:15,color:"#888"}}>레시피 불러오는 중...</p>
    </div>
  );
  if(!db) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#F7F7F9",padding:24}}>
      <div style={{background:"#fff",borderRadius:20,padding:28,textAlign:"center",maxWidth:360}}>
        <div style={{fontSize:48,marginBottom:12}}>⚠️</div>
        <h2 style={{fontSize:18,fontWeight:700,marginBottom:8}}>데이터 로드 실패</h2>
        <p style={{fontSize:13,color:"#888"}}>recipes.json 파일을 확인해주세요.</p>
      </div>
    </div>
  );

  const {cats,dishes,recipes}=db;
  const allDishes=Object.entries(dishes).flatMap(([cid,arr])=>arr.map(d=>({...d,catId:Number(cid)})));
  const allRecipes=Object.entries(recipes).flatMap(([did,arr])=>arr.map(r=>({...r,dishId:Number(did)})));
  const getCat=(id)=>cats.find(c=>c.id===id)||cats[0];
  const activeCat=cats.find(c=>c.id===cat);
  const activeDish=dish?allDishes.find(d=>d.id===dish):null;
  const activeRecipe=recipe?allRecipes.find(r=>r.id===recipe):null;
  const accent=activeCat?.color||"#E8412A";
  const accentLight=activeCat?.light||"#FFF1EF";
  const isFav=(id)=>favs.includes(id);
  const toggleFav=(id)=>setFavs(f=>{const n=f.includes(id)?f.filter(x=>x!==id):[...f,id];LS.set("spa_favs",n);return n;});
  const openReview=(id)=>{const rv=ratings[id];setDraftStar(rv?.star||0);setDraftNote(rv?.note||"");setReviewModal(id);};
  const saveReview=()=>{const n={...ratings,[reviewModal]:{star:draftStar,note:draftNote}};setRatings(n);LS.set("spa_ratings",n);setReviewModal(null);};
  const favRecipes=favs.map(id=>allRecipes.find(r=>r.id===id)).filter(Boolean);
  const searchResults=query.trim().length>=1?allDishes.filter(d=>d.name.includes(query.trim())):[];
  const openDish=(d)=>{setCat(d.catId);setDish(d.id);setRecipe(null);setStep(null);setTab("home");};
  const openRecipe=(r)=>{setRecipe(r.id);setStep(null);setTab("home");};
  const goBack=()=>{
    if(activeRecipe){setRecipe(null);setStep(null);}
    else if(activeDish)setDish(null);
    else if(activeCat)setCat(null);
  };
  const breadcrumb=[activeCat?.name,activeDish?.name,activeRecipe?.title].filter(Boolean);
  const inNav=tab==="home"&&(cat||dish||recipe);

  // ── 수정 요청 제출 ─────────────────────────────────────
  const openEdit=(r,field,original)=>{
    setEditModal({recipe:r,field,original});
    setEditValue(Array.isArray(original)?original.join("\n"):original||"");
    setEditReason("");
    setEditDone(false);
  };
  const submitEdit=async()=>{
    if(!editValue.trim()||!editModal)return;
    setEditSending(true);
    try{
      await sbFetch("edit_requests",{
        method:"POST",
        headers:{"Prefer":"return=minimal"},
        body:JSON.stringify({
          dish_id:editModal.recipe.dishId,
          recipe_id:editModal.recipe.id,
          dish_name:allDishes.find(d=>RECIPES_BY_ID[editModal.recipe.id]?.dishId===d.id)?.name||"",
          recipe_title:editModal.recipe.title,
          field:editModal.field,
          original_value:Array.isArray(editModal.original)?editModal.original.join("\n"):String(editModal.original||""),
          suggested_value:editValue.trim(),
          reason:editReason.trim(),
          status:"pending"
        })
      });
      setEditDone(true);
    }catch(e){alert("전송 실패. 잠시 후 다시 시도해주세요.");}
    setEditSending(false);
  };

  // ── 관리자 ────────────────────────────────────────────
  const loginAdmin=()=>{
    if(adminPw===ADMIN_PW){setAdminMode(true);loadAdminRequests();}
    else alert("비밀번호가 틀렸습니다.");
  };
  const loadAdminRequests=async()=>{
    setAdminLoading(true);
    try{
      const r=await sbFetch("edit_requests?order=created_at.desc&select=*");
      const data=await r.json();
      setAdminRequests(Array.isArray(data)?data:[]);
    }catch{}
    setAdminLoading(false);
  };
  const updateRequest=async(id,status)=>{
    await sbFetch(`edit_requests?id=eq.${id}`,{
      method:"PATCH",
      headers:{"Prefer":"return=minimal"},
      body:JSON.stringify({status})
    });
    loadAdminRequests();
  };

  // ── 레시피 카드 ───────────────────────────────────────
  const RecipeCard=({r})=>{
    const b=r.badge?BC[r.badge]||{}:{};
    const rv=ratings[r.id];
    return(
      <div onClick={()=>openRecipe(r)} style={{background:"#fff",borderRadius:18,padding:"16px",marginBottom:12,boxShadow:"0 2px 16px rgba(0,0,0,.06)",cursor:"pointer",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",left:0,top:0,bottom:0,width:4,background:accent}}/>
        <div style={{paddingLeft:10}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:6}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:4}}>
                <span style={{fontSize:15,fontWeight:700,color:"#111"}}>{r.title}</span>
                {b.bg&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:b.bg,color:b.c,fontWeight:700}}>{r.badge}</span>}
              </div>
              <p style={{fontSize:12,color:"#888",lineHeight:1.5,marginBottom:8}}>{r.desc}</p>
              <div style={{display:"flex",gap:10,fontSize:11,color:"#AAA",alignItems:"center"}}>
                <span>⏱ {r.time}분</span><span>{DIFF[r.diff]}</span><span>✍️ {r.author}</span>
                {rv&&<Stars v={rv.star} size={12}/>}
              </div>
            </div>
            <button onClick={e=>{e.stopPropagation();toggleFav(r.id);}} style={{fontSize:22,border:"none",background:"none",cursor:"pointer",padding:0,marginLeft:8,flexShrink:0}}>
              {isFav(r.id)?"❤️":"🤍"}
            </button>
          </div>
          {rv?.note&&<div style={{background:accentLight,borderRadius:8,padding:"6px 10px",fontSize:11,color:"#555",fontStyle:"italic"}}>📝 {rv.note}</div>}
        </div>
      </div>
    );
  };

  // ── 레시피 상세 ───────────────────────────────────────
  const RecipeDetail=()=>{
    const r=activeRecipe;if(!r)return null;
    const rv=ratings[r.id];
    const b=r.badge?BC[r.badge]||{}:{};
    return(
      <div className="fade">
        <div style={{background:`linear-gradient(135deg,${accent}18 0%,#fff 60%)`,borderRadius:20,padding:"20px",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            {b.bg&&<span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:b.bg,color:b.c,fontWeight:700}}>{r.badge}</span>}
            <button onClick={()=>openReview(r.id)} style={{marginLeft:"auto",fontSize:12,padding:"6px 14px",borderRadius:20,border:`1.5px solid ${accent}`,background:"#fff",color:accent,cursor:"pointer",fontWeight:600}}>
              {rv?"✏️ 후기 수정":"⭐ 후기 남기기"}
            </button>
          </div>
          <h2 style={{fontSize:20,fontWeight:800,color:"#111",marginBottom:6}}>{r.title}</h2>
          <p style={{fontSize:13,color:"#777",marginBottom:rv?16:20,lineHeight:1.6}}>{r.desc}</p>
          {rv&&<div style={{background:"#fff",borderRadius:12,padding:"10px 14px",boxShadow:"0 2px 8px rgba(0,0,0,.06)",marginBottom:16}}><Stars v={rv.star} size={16}/>{rv.note&&<p style={{fontSize:12,color:"#666",marginTop:6,fontStyle:"italic"}}>"{rv.note}"</p>}</div>}
          <div style={{display:"flex"}}>
            {[{label:"소요",value:`${r.time}분`},{label:"난이도",value:`${r.diff}/5`},{label:"작성자",value:r.author}].map((it,i)=>(
              <div key={i} style={{flex:1,textAlign:"center",borderRight:i<2?`1px solid ${accent}22`:"none"}}>
                <div style={{fontSize:16,fontWeight:800,color:accent}}>{it.value}</div>
                <div style={{fontSize:10,color:"#AAA",marginTop:2}}>{it.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* 재료 */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <h3 style={{fontSize:15,fontWeight:800,color:"#111"}}>🧂 재료</h3>
          <button onClick={()=>openEdit(r,"ingredients",r.ing)} style={{fontSize:11,color:accent,border:`1px solid ${accent}`,borderRadius:12,padding:"3px 10px",background:"#fff",cursor:"pointer"}}>✏️ 수정 제안</button>
        </div>
        <div style={{background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,.05)",marginBottom:20}}>
          {r.ing.map((ing,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"12px 16px",borderBottom:i<r.ing.length-1?"1px solid #F8F8F8":"none",background:i%2===0?"#fff":"#FAFAFA"}}>
              <span style={{fontSize:14,color:"#333"}}>{ing.n}</span>
              <span style={{fontSize:14,color:accent,fontWeight:700}}>{ing.a}</span>
            </div>
          ))}
        </div>

        {/* 조리 순서 */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <h3 style={{fontSize:15,fontWeight:800,color:"#111"}}>👨‍🍳 조리 순서</h3>
          <button onClick={()=>openEdit(r,"steps",r.steps)} style={{fontSize:11,color:accent,border:`1px solid ${accent}`,borderRadius:12,padding:"3px 10px",background:"#fff",cursor:"pointer"}}>✏️ 수정 제안</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {r.steps.map((s,i)=>{
            const n=i+1;
            return(
              <div key={i} onClick={()=>setStep(step===n?null:n)} style={{background:step===n?accent:"#fff",borderRadius:16,padding:"14px 16px",boxShadow:"0 2px 10px rgba(0,0,0,.06)",cursor:"pointer",transition:"all .2s"}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                  <div style={{width:28,height:28,borderRadius:"50%",flexShrink:0,background:step===n?"rgba(255,255,255,.25)":accent,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800}}>{n}</div>
                  <p style={{fontSize:13.5,lineHeight:1.7,paddingTop:4,color:step===n?"#fff":"#333"}}>{s}</p>
                </div>
              </div>
            );
          })}
        </div>

        {/* 전체 수정 제안 버튼 */}
        <button onClick={()=>openEdit(r,"기타","")} style={{width:"100%",height:44,borderRadius:14,border:`1.5px solid ${accent}`,background:"#fff",color:accent,fontSize:13,fontWeight:600,cursor:"pointer",marginTop:16,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          💬 기타 오타/수정 제안하기
        </button>

        <button onClick={()=>toggleFav(r.id)} style={{width:"100%",height:52,borderRadius:16,border:isFav(r.id)?`2px solid #E74C3C`:"none",background:isFav(r.id)?"#fff":`linear-gradient(135deg,${accent},${accent}CC)`,color:isFav(r.id)?"#E74C3C":"#fff",fontSize:15,fontWeight:700,cursor:"pointer",marginTop:10,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {isFav(r.id)?"❤️ 즐겨찾기 해제":"🤍 즐겨찾기 추가"}
        </button>
      </div>
    );
  };

  // ── 홈 콘텐츠 ────────────────────────────────────────
  const HomeContent=()=>{
    if(activeRecipe)return<RecipeDetail/>;
    if(dish){
      const list=recipes[dish]||[];
      return(
        <div className="fade">
          <p style={{fontSize:12,color:"#AAA",marginBottom:14}}>{list.length}가지 레시피</p>
          {list.length>0?list.map(r=><RecipeCard key={r.id} r={r}/>):<div style={{padding:"40px",textAlign:"center",color:"#CCC",fontSize:14}}>🔜 레시피 준비 중</div>}
        </div>
      );
    }
    if(cat){
      const list=dishes[cat]||[];
      return(
        <div className="fade">
          <p style={{fontSize:12,color:"#AAA",marginBottom:12}}>{list.length}가지 요리</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {list.map(d=>(
              <div key={d.id} onClick={()=>setDish(d.id)} style={{background:"#fff",borderRadius:16,padding:"16px 10px",boxShadow:"0 2px 10px rgba(0,0,0,.06)",textAlign:"center",cursor:"pointer"}}>
                <div style={{fontSize:28,marginBottom:8}}>{d.e}</div>
                <div style={{fontSize:13,fontWeight:700,color:"#111",lineHeight:1.3}}>{d.name}</div>
                {recipes[d.id]&&<div style={{fontSize:10,color:accent,marginTop:4,fontWeight:600}}>{recipes[d.id].length}가지</div>}
              </div>
            ))}
          </div>
        </div>
      );
    }
    return(
      <div className="fade">
        <p style={{fontSize:13,color:"#AAA",marginBottom:20}}>카테고리를 선택해 레시피를 찾아보세요</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {cats.map(c=>(
            <div key={c.id} onClick={()=>setCat(c.id)} style={{background:"#fff",borderRadius:20,padding:"20px 12px",boxShadow:"0 4px 20px rgba(0,0,0,.07)",textAlign:"center",cursor:"pointer",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:-10,right:-10,width:60,height:60,borderRadius:"50%",background:c.light}}/>
              <div style={{fontSize:34,marginBottom:10,position:"relative"}}>{c.e}</div>
              <div style={{fontSize:15,fontWeight:800,color:"#111",position:"relative"}}>{c.name}</div>
              <div style={{width:24,height:3,borderRadius:2,background:c.color,margin:"8px auto 0",opacity:.7}}/>
            </div>
          ))}
        </div>
        {favRecipes.length>0&&(
          <div style={{marginTop:28}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <h3 style={{fontSize:15,fontWeight:800,color:"#111"}}>❤️ 최근 즐겨찾기</h3>
              <button onClick={()=>setTab("favs")} style={{fontSize:12,color:"#E8412A",border:"none",background:"none",cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>전체 →</button>
            </div>
            {favRecipes.slice(-3).reverse().map(r=>{
              const d=allDishes.find(d=>recipes[d.id]?.some(x=>x.id===r.id));
              const c=d?getCat(d.catId):cats[0];
              return(
                <div key={r.id} onClick={()=>openRecipe(r)} style={{background:"#fff",borderRadius:14,padding:"12px 14px",marginBottom:8,boxShadow:"0 2px 10px rgba(0,0,0,.05)",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                  <div style={{width:40,height:40,borderRadius:12,background:c.light,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{d?.e||"🍽️"}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#111"}}>{r.title}</div>
                    <div style={{fontSize:11,color:"#AAA",marginTop:2}}>⏱ {r.time}분</div>
                  </div>
                  {ratings[r.id]&&<Stars v={ratings[r.id].star} size={12}/>}
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  // ── 검색 탭 ───────────────────────────────────────────
  const SearchTab=()=>(
    <div className="fade">
      <h2 style={{fontSize:22,fontWeight:800,color:"#111",marginBottom:4}}>검색</h2>
      <p style={{fontSize:13,color:"#AAA",marginBottom:20}}>음식 이름으로 바로 찾기</p>
      <div style={{position:"relative",marginBottom:20}}>
        <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:16}}>🔍</span>
        <input ref={searchRef} defaultValue={query} onInput={e=>setQuery(e.target.value)} placeholder="닭갈비, 감바스, 마라샹궈..."
          style={{width:"100%",height:50,borderRadius:14,border:"1.5px solid #E8E8E8",paddingLeft:44,paddingRight:16,fontSize:15,background:"#fff",boxShadow:"0 2px 12px rgba(0,0,0,.05)"}}/>
        {query&&<button onClick={()=>{setQuery("");if(searchRef.current)searchRef.current.value="";}} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",border:"none",background:"none",fontSize:16,cursor:"pointer",color:"#AAA"}}>✕</button>}
      </div>
      {query.trim().length>=1?(
        <>
          <p style={{fontSize:12,color:"#AAA",marginBottom:12}}>{searchResults.length>0?`"${query}" 검색 결과 ${searchResults.length}건`:`"${query}"에 해당하는 음식이 없습니다`}</p>
          {searchResults.map(d=>{
            const c=getCat(d.catId);
            return(
              <div key={d.id} onClick={()=>openDish(d)} style={{background:"#fff",borderRadius:16,padding:"14px 16px",marginBottom:10,boxShadow:"0 2px 12px rgba(0,0,0,.06)",display:"flex",alignItems:"center",gap:14,cursor:"pointer"}}>
                <div style={{width:46,height:46,borderRadius:14,background:c.light,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{d.e}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:700,color:"#111",marginBottom:2}}>{d.name}</div>
                  <div style={{display:"flex",gap:8,fontSize:11}}>
                    <span style={{background:c.light,color:c.color,padding:"2px 8px",borderRadius:20,fontWeight:600}}>{c.name}</span>
                    <span style={{color:"#AAA"}}>{(recipes[d.id]||[]).length}가지 레시피</span>
                  </div>
                </div>
                <span style={{color:"#CCC",fontSize:16}}>›</span>
              </div>
            );
          })}
        </>
      ):(
        <>
          <p style={{fontSize:13,fontWeight:700,color:"#111",marginBottom:12}}>자주 찾는 음식</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {["닭갈비","굴국밥","바지락술찜","마라샹궈","감바스","세비체","뽈뽀","항정살","두부김치","팟타이","까망베르","뱅쇼","크림관자","육회"].map(w=>(
              <button key={w} onClick={()=>setQuery(w)} style={{padding:"8px 14px",borderRadius:20,border:"1.5px solid #E8E8E8",background:"#fff",fontSize:13,cursor:"pointer",color:"#555"}}>{w}</button>
            ))}
          </div>
        </>
      )}
    </div>
  );

  // ── 즐겨찾기 탭 ──────────────────────────────────────
  const FavsTab=()=>(
    <div className="fade">
      <h2 style={{fontSize:22,fontWeight:800,color:"#111",marginBottom:4}}>즐겨찾기</h2>
      <p style={{fontSize:13,color:"#AAA",marginBottom:20}}>내가 저장한 레시피 모음</p>
      {favRecipes.length===0?(
        <div style={{textAlign:"center",padding:"60px 20px"}}>
          <div style={{fontSize:48,marginBottom:12}}>🤍</div>
          <p style={{fontSize:15,fontWeight:600,color:"#BBB"}}>아직 저장된 레시피가 없어요</p>
          <p style={{fontSize:13,color:"#CCC",marginTop:6}}>레시피에서 ❤️ 버튼을 눌러보세요</p>
        </div>
      ):favRecipes.map(r=>{
        const d=allDishes.find(d=>recipes[d.id]?.some(x=>x.id===r.id));
        const c=d?getCat(d.catId):cats[0];
        const rv=ratings[r.id];
        return(
          <div key={r.id} onClick={()=>openRecipe(r)} style={{background:"#fff",borderRadius:18,marginBottom:12,boxShadow:"0 2px 16px rgba(0,0,0,.06)",overflow:"hidden",cursor:"pointer"}}>
            <div style={{height:4,background:c.color}}/>
            <div style={{padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                    <span style={{background:c.light,color:c.color,fontSize:10,padding:"2px 8px",borderRadius:20,fontWeight:700}}>{c.name}</span>
                    {rv&&<Stars v={rv.star} size={12}/>}
                  </div>
                  <div style={{fontSize:15,fontWeight:700,color:"#111",marginBottom:4}}>{r.title}</div>
                  <div style={{fontSize:12,color:"#AAA"}}>⏱ {r.time}분 · {DIFF[r.diff]}</div>
                  {rv?.note&&<p style={{fontSize:11,color:"#888",marginTop:6,fontStyle:"italic"}}>"{rv.note}"</p>}
                </div>
                <button onClick={e=>{e.stopPropagation();toggleFav(r.id);}} style={{fontSize:22,border:"none",background:"none",cursor:"pointer",padding:0,flexShrink:0}}>❤️</button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );

  // ── 관리자 탭 ─────────────────────────────────────────
  const AdminTab=()=>(
    <div className="fade">
      <h2 style={{fontSize:22,fontWeight:800,color:"#111",marginBottom:4}}>관리자</h2>
      {!adminMode?(
        <div style={{background:"#fff",borderRadius:20,padding:24,marginTop:16,boxShadow:"0 2px 16px rgba(0,0,0,.06)"}}>
          <p style={{fontSize:14,color:"#555",marginBottom:16}}>관리자 비밀번호를 입력하세요</p>
          <input type="password" value={adminPw} onChange={e=>setAdminPw(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&loginAdmin()}
            placeholder="비밀번호"
            style={{width:"100%",height:48,borderRadius:12,border:"1.5px solid #E8E8E8",padding:"0 16px",fontSize:15,marginBottom:12}}/>
          <button onClick={loginAdmin} style={{width:"100%",height:48,borderRadius:12,background:"#C0392B",color:"#fff",border:"none",fontSize:15,fontWeight:700,cursor:"pointer"}}>
            로그인
          </button>
        </div>
      ):(
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,marginTop:8}}>
            <p style={{fontSize:13,color:"#888"}}>수정 요청 목록</p>
            <button onClick={loadAdminRequests} style={{fontSize:12,color:"#2980B9",border:"none",background:"none",cursor:"pointer"}}>🔄 새로고침</button>
          </div>
          {adminLoading?<div style={{textAlign:"center",padding:40,color:"#AAA"}}>로딩 중...</div>:
          adminRequests.length===0?<div style={{textAlign:"center",padding:40,color:"#CCC"}}>수정 요청이 없습니다</div>:
          adminRequests.map(req=>(
            <div key={req.id} style={{background:"#fff",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 2px 10px rgba(0,0,0,.06)"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:13,fontWeight:700,color:"#111"}}>{req.recipe_title}</span>
                <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,
                  background:req.status==="pending"?"#FFF3CD":req.status==="approved"?"#D4EDDA":"#F8D7DA",
                  color:req.status==="pending"?"#856404":req.status==="approved"?"#155724":"#721C24",
                  fontWeight:600}}>
                  {req.status==="pending"?"대기중":req.status==="approved"?"승인됨":"거절됨"}
                </span>
              </div>
              <div style={{fontSize:12,color:"#888",marginBottom:6}}>
                <span style={{background:"#F0F0F0",borderRadius:6,padding:"2px 6px",marginRight:6}}>{req.field}</span>
                {new Date(req.created_at).toLocaleDateString("ko-KR")}
              </div>
              {req.original_value&&<div style={{fontSize:12,color:"#999",marginBottom:4,padding:"6px 10px",background:"#FFF5F5",borderRadius:8}}>
                기존: {req.original_value.substring(0,100)}{req.original_value.length>100?"...":""}
              </div>}
              <div style={{fontSize:13,color:"#333",padding:"6px 10px",background:"#F0F8FF",borderRadius:8,marginBottom:req.reason?8:0}}>
                수정안: {req.suggested_value}
              </div>
              {req.reason&&<div style={{fontSize:12,color:"#888",fontStyle:"italic",marginTop:4}}>이유: {req.reason}</div>}
              {req.status==="pending"&&(
                <div style={{display:"flex",gap:8,marginTop:10}}>
                  <button onClick={()=>updateRequest(req.id,"approved")} style={{flex:1,height:36,borderRadius:10,background:"#27AE60",color:"#fff",border:"none",fontSize:13,fontWeight:600,cursor:"pointer"}}>✅ 승인</button>
                  <button onClick={()=>updateRequest(req.id,"rejected")} style={{flex:1,height:36,borderRadius:10,background:"#E74C3C",color:"#fff",border:"none",fontSize:13,fontWeight:600,cursor:"pointer"}}>❌ 거절</button>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );

  // ── 네비게이션 바 ─────────────────────────────────────
  const NavBar=()=>(
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:440,background:"#fff",borderTop:"1px solid #F0F0F0",display:"flex",zIndex:100}}>
      {[{key:"home",icon:"🏠",label:"홈"},{key:"search",icon:"🔍",label:"검색"},{key:"favs",icon:"❤️",label:`즐겨찾기${favs.length>0?` (${favs.length})`:""}`},{key:"admin",icon:"⚙️",label:"관리자"}].map(n=>(
        <button key={n.key} onClick={()=>{setTab(n.key);if(n.key==="search")setTimeout(()=>searchRef.current?.focus(),100);}}
          style={{flex:1,border:"none",background:"none",padding:"10px 0 12px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <span style={{fontSize:18}}>{n.icon}</span>
          <span style={{fontSize:9,fontWeight:tab===n.key?700:400,color:tab===n.key?accent:"#AAA"}}>{n.label}</span>
          {tab===n.key&&<span style={{width:20,height:2,borderRadius:2,background:accent}}/>}
        </button>
      ))}
    </div>
  );

  // ── 수정 요청 모달 ────────────────────────────────────
  const EditModal=()=>editModal&&(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:"#fff",width:"100%",maxWidth:440,borderRadius:"20px 20px 0 0",padding:"28px 24px 40px",maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{width:36,height:4,background:"#E0E0E0",borderRadius:2,margin:"0 auto 20px"}}/>
        {editDone?(
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontSize:48,marginBottom:12}}>✅</div>
            <h3 style={{fontSize:18,fontWeight:700,color:"#111",marginBottom:8}}>수정 요청 완료!</h3>
            <p style={{fontSize:13,color:"#888",marginBottom:20}}>관리자 검토 후 반영됩니다.</p>
            <button onClick={()=>setEditModal(null)} style={{padding:"12px 32px",borderRadius:14,background:accent,color:"#fff",border:"none",fontSize:14,fontWeight:700,cursor:"pointer"}}>닫기</button>
          </div>
        ):(
          <>
            <h3 style={{fontSize:17,fontWeight:700,color:"#111",marginBottom:4}}>수정 제안</h3>
            <p style={{fontSize:13,color:"#888",marginBottom:4}}>{editModal.recipe.title}</p>
            <p style={{fontSize:12,color:accent,marginBottom:16,fontWeight:600}}>수정 항목: {editModal.field==="ingredients"?"재료":editModal.field==="steps"?"조리 순서":"기타"}</p>
            {editModal.field!=="기타"&&(
              <div style={{background:"#F8F8F8",borderRadius:10,padding:12,marginBottom:16,fontSize:12,color:"#888"}}>
                <p style={{fontWeight:600,marginBottom:4}}>현재 내용:</p>
                {editModal.field==="ingredients"
                  ?editModal.original.map((ing,i)=><p key={i}>{ing.n}: {ing.a}</p>)
                  :editModal.original.map((s,i)=><p key={i}>{i+1}. {s}</p>)
                }
              </div>
            )}
            <p style={{fontSize:13,fontWeight:600,color:"#555",marginBottom:8}}>수정 내용 *</p>
            <textarea value={editValue} onChange={e=>setEditValue(e.target.value)}
              placeholder={editModal.field==="ingredients"?"재료명: 양, 재료명: 양 형식으로 작성\n(예시)\n된장: 2큰술\n두부: 1/2모":editModal.field==="steps"?"조리 순서를 순서대로 작성해주세요":"어떤 부분이 잘못됐는지 설명해주세요"}
              style={{width:"100%",height:120,border:"1.5px solid #E8E8E8",borderRadius:12,padding:"12px",fontSize:13,resize:"none",marginBottom:12}}/>
            <p style={{fontSize:13,fontWeight:600,color:"#555",marginBottom:8}}>수정 이유 (선택)</p>
            <input value={editReason} onChange={e=>setEditReason(e.target.value)} placeholder="예: 분량이 너무 많아요, 순서가 틀렸어요"
              style={{width:"100%",height:44,border:"1.5px solid #E8E8E8",borderRadius:12,padding:"0 12px",fontSize:13,marginBottom:16}}/>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setEditModal(null)} style={{flex:1,height:48,borderRadius:14,border:"1.5px solid #E0E0E0",background:"#fff",fontSize:14,cursor:"pointer",color:"#888"}}>취소</button>
              <button onClick={submitEdit} disabled={!editValue.trim()||editSending}
                style={{flex:2,height:48,borderRadius:14,border:"none",background:editValue.trim()&&!editSending?accent:"#CCC",color:"#fff",fontSize:14,fontWeight:700,cursor:editValue.trim()&&!editSending?"pointer":"default"}}>
                {editSending?"전송 중...":"제안 보내기"}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );

  // ── 후기 모달 ─────────────────────────────────────────
  const ReviewModal=()=>reviewModal&&(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:"#fff",width:"100%",maxWidth:440,borderRadius:"20px 20px 0 0",padding:"28px 24px 40px"}}>
        <div style={{width:36,height:4,background:"#E0E0E0",borderRadius:2,margin:"0 auto 20px"}}/>
        <h3 style={{fontSize:17,fontWeight:700,color:"#111",marginBottom:4}}>레시피 후기 남기기</h3>
        <p style={{fontSize:13,color:"#888",marginBottom:20}}>{allRecipes.find(r=>r.id===reviewModal)?.title}</p>
        <p style={{fontSize:13,fontWeight:600,color:"#555",marginBottom:8}}>맛 평점</p>
        <Stars v={draftStar} onChange={setDraftStar} size={32}/>
        <p style={{fontSize:13,fontWeight:600,color:"#555",margin:"18px 0 8px"}}>메모 (선택)</p>
        <textarea value={draftNote} onChange={e=>setDraftNote(e.target.value)} placeholder="어떤 점이 좋았나요?"
          style={{width:"100%",height:80,border:"1.5px solid #E8E8E8",borderRadius:12,padding:"12px",fontSize:13,resize:"none"}}/>
        <div style={{display:"flex",gap:10,marginTop:16}}>
          <button onClick={()=>setReviewModal(null)} style={{flex:1,height:48,borderRadius:14,border:"1.5px solid #E0E0E0",background:"#fff",fontSize:14,cursor:"pointer",color:"#888"}}>취소</button>
          <button onClick={saveReview} disabled={!draftStar} style={{flex:2,height:48,borderRadius:14,border:"none",background:draftStar?accent:"#CCC",color:"#fff",fontSize:14,fontWeight:700,cursor:draftStar?"pointer":"default"}}>저장하기</button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{fontFamily:"-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif",background:"#F7F7F9",minHeight:"100vh",maxWidth:440,margin:"0 auto"}}>
      {/* 헤더 */}
      <div style={{background:inNav?accent:"#fff",color:inNav?"#fff":"#111",padding:inNav?"18px 18px 20px":"16px 18px 14px",transition:"background .3s",position:"sticky",top:0,zIndex:50,borderBottom:inNav?"none":"1px solid #F0F0F0"}}>
        {inNav?(
          <>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <button onClick={goBack} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:20,color:"#fff",padding:"5px 14px",fontSize:13,cursor:"pointer",fontWeight:600}}>← 뒤로</button>
              <span style={{fontSize:11,opacity:.7,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{breadcrumb.join(" › ")}</span>
            </div>
            <h1 style={{fontSize:19,fontWeight:800,letterSpacing:-.5}}>
              {activeRecipe?activeRecipe.title:activeDish?`${activeDish.e} ${activeDish.name}`:activeCat?`${activeCat.e} ${activeCat.name}`:""}
            </h1>
          </>
        ):(
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <h1 style={{fontSize:22,fontWeight:800,color:"#111"}}>
                {tab==="search"?"🔍 검색":tab==="favs"?"❤️ 즐겨찾기":tab==="admin"?"⚙️ 관리자":"🍽️ 오늘 뭐 먹지?"}
              </h1>
              {tab==="home"&&<p style={{fontSize:12,color:"#AAA",marginTop:2}}>레시피를 찾고, 저장하고, 기록하세요</p>}
            </div>
            {tab==="home"&&<button onClick={()=>setTab("search")} style={{width:38,height:38,borderRadius:12,border:"1.5px solid #E8E8E8",background:"#fff",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>🔍</button>}
          </div>
        )}
      </div>

      <div style={{padding:"16px 14px 90px"}}>
        {tab==="home"&&<HomeContent/>}
        {tab==="search"&&<SearchTab/>}
        {tab==="favs"&&<FavsTab/>}
        {tab==="admin"&&<AdminTab/>}
      </div>

      <NavBar/>
      <EditModal/>
      <ReviewModal/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js'));
  }
</script>
</body>
</html>
