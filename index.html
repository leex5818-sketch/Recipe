<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="오늘 뭐먹지"/>
<meta name="theme-color" content="#F2F4F6"/>
<title>오늘 뭐먹지</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.svg"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css"/>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
<style>
:root{
  --bg:#F2F4F6;--card:#FFFFFF;
  --text-strong:#191F28;--text:#333D4B;--text-sub:#6B7684;--text-mute:#8B95A1;
  --primary:#3182F6;--primary-soft:#E8F3FF;--primary-press:#2470d6;
  --warn:#FF9500;--warn-soft:#FFF4E5;
  --danger:#F04452;--danger-soft:#FDECEE;
  --success:#00C896;--success-soft:#E5F8F2;
  --divider:#F2F4F6;--border:#E5E8EB;
  --radius-sm:8px;--radius:14px;--radius-lg:20px;--radius-pill:999px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 12px rgba(0,0,0,.06);
  --shadow-lg:0 30px 60px -20px rgba(0,0,0,.15);
  /* 카테고리 토큰 */
  --c1:#E8412A;--c1-soft:#FFF1EF; /* 한식 */
  --c2:#2C3E50;--c2-soft:#EEF1F4; /* 일식 */
  --c3:#E67E22;--c3-soft:#FEF3E7; /* 중식 */
  --c4:#27AE60;--c4-soft:#EAF7EF; /* 이유식 */
  --c5:#8E44AD;--c5-soft:#F5EEF8; /* 양식 */
  --c6:#D35400;--c6-soft:#FEF0E7; /* 분식 */
  --c7:#16A085;--c7-soft:#E8F8F5; /* 베트남 */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  letter-spacing:-0.01em;-webkit-font-smoothing:antialiased}
button,input,textarea,select{outline:none;font-family:inherit;color:inherit;border:none;background:none}
button{cursor:pointer}
img{display:block;max-width:100%}
a{text-decoration:none;color:inherit}
#root{min-height:100%}
.app{max-width:440px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:96px}
.fade{animation:fu .2s ease forwards}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fa{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ── 헤더 ───────────────────────────────────── */
.header{background:var(--card);padding:14px 18px;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--divider)}
.h-row{display:flex;align-items:center;justify-content:space-between}
.h-title{font-size:22px;font-weight:800;color:var(--text-strong);letter-spacing:-.03em}
.h-sub{font-size:12px;color:var(--text-mute);margin-top:2px;letter-spacing:-.01em}
.h-icon-btn{width:40px;height:40px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--text-sub);transition:.15s}
.h-icon-btn:active{background:var(--primary-soft);color:var(--primary)}
.h-nav{display:flex;align-items:center;gap:10px}
.h-back{padding:4px;display:flex;color:var(--text-strong)}
.h-crumb{font-size:11px;color:var(--text-mute);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.01em}
.h-current{font-size:17px;font-weight:700;color:var(--text-strong);letter-spacing:-.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.main{padding:16px 16px 30px}

/* ── 카테고리 그리드 ───────────────────────────── */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.cat-card{background:var(--card);border-radius:var(--radius-lg);padding:18px 16px;display:flex;flex-direction:column;justify-content:space-between;gap:14px;min-height:130px;box-shadow:var(--shadow-sm);transition:.15s}
.cat-card:active{transform:scale(.98);box-shadow:var(--shadow)}
.cat-emoji{font-size:38px;line-height:1}
.cat-bot{display:flex;flex-direction:column;gap:6px}
.cat-name{font-size:15px;font-weight:700;color:var(--text-strong);letter-spacing:-.02em}
.cat-chip{align-self:flex-start;padding:4px 10px;border-radius:var(--radius-pill);font-size:11px;font-weight:600}

/* ── 즐겨찾기 미리보기 (홈) ───────────────────── */
.section-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:16px;font-weight:800;color:var(--text-strong);letter-spacing:-.02em;display:flex;align-items:center;gap:6px}
.section-more{font-size:13px;color:var(--primary);font-weight:600}
.mini-fav{background:var(--card);border-radius:var(--radius);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm)}
.mini-dot{width:38px;height:38px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.mini-text{flex:1;min-width:0}
.mini-name{font-size:14px;font-weight:600;color:var(--text-strong);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-meta{font-size:12px;color:var(--text-mute);margin-top:2px}

/* ── 음식 리스트 ───────────────────────────────── */
.list-count{font-size:13px;color:var(--text-mute);margin-bottom:12px;letter-spacing:-.01em}
.dish-card{background:var(--card);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm)}
.dish-row{display:flex;align-items:center;padding:14px 16px;gap:14px;border-bottom:1px solid var(--divider)}
.dish-row:last-child{border-bottom:none}
.dish-bar{width:5px;height:30px;border-radius:3px;flex-shrink:0}
.dish-text{flex:1;min-width:0}
.dish-name{font-size:15px;font-weight:600;color:var(--text-strong);letter-spacing:-.01em}
.dish-sub{font-size:12px;color:var(--text-mute);margin-top:2px}

/* ── RecipeCard ───────────────────────────────── */
.recipe-card{background:var(--card);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;transition:.15s}
.recipe-card:active{box-shadow:var(--shadow)}
.recipe-bar{position:absolute;left:0;top:14px;bottom:14px;width:4px;border-radius:0 3px 3px 0}
.recipe-body{padding-left:10px}
.recipe-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:4px}
.recipe-title{font-size:16px;font-weight:700;color:var(--text-strong);letter-spacing:-.02em}
.recipe-desc{font-size:13px;color:var(--text-sub);line-height:1.55;margin:6px 0 10px}
.recipe-meta{display:flex;gap:14px;font-size:12px;color:var(--text-mute);align-items:center;flex-wrap:wrap}
.meta-item{display:inline-flex;align-items:center;gap:4px}
.badge{font-size:11px;padding:3px 10px;border-radius:var(--radius-pill);font-weight:600;flex-shrink:0}
.badge-primary{background:var(--primary-soft);color:var(--primary)}
.badge-warn{background:var(--warn-soft);color:var(--warn)}
.badge-success{background:var(--success-soft);color:var(--success)}
.badge-mute{background:var(--bg);color:var(--text-sub)}
.fav-btn{font-size:22px;line-height:1;flex-shrink:0;color:var(--text-mute);transition:.15s}
.fav-btn.on{color:var(--danger)}
.review-note{background:var(--bg);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;color:var(--text-sub);margin-top:10px;font-style:italic}

/* ── RecipeDetail ─────────────────────────────── */
.detail-hero{background:var(--card);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.detail-hero-bar{position:absolute;left:0;top:0;bottom:0;width:5px}
.detail-hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.detail-title{font-size:22px;font-weight:800;color:var(--text-strong);letter-spacing:-.03em;margin-bottom:6px;line-height:1.3}
.detail-desc{font-size:14px;color:var(--text-sub);line-height:1.55;margin-bottom:16px}
.detail-stats{display:flex;background:var(--bg);border-radius:var(--radius);padding:14px 0;margin-bottom:12px}
.stat{flex:1;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-val{font-size:16px;font-weight:800;color:var(--text-strong);letter-spacing:-.02em}
.stat-lbl{font-size:11px;color:var(--text-mute);margin-top:2px}
.source-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--primary);color:#fff;border-radius:var(--radius);font-size:14px;font-weight:700;margin-top:12px}
.source-btn:active{background:var(--primary-press)}

.review-cta{font-size:12px;padding:7px 14px;border-radius:var(--radius-pill);background:var(--primary-soft);color:var(--primary);font-weight:600;display:inline-flex;align-items:center;gap:4px}

.lang-row{display:flex;gap:6px;margin-bottom:14px;align-items:center;overflow-x:auto;padding-bottom:2px}
.lang-btn{flex-shrink:0;padding:6px 14px;border-radius:var(--radius-pill);background:var(--card);color:var(--text-sub);font-size:12px;font-weight:500;border:1.5px solid var(--border);transition:.15s}
.lang-btn.on{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:700}
.lang-lbl{font-size:11px;color:var(--text-mute);flex-shrink:0;margin-right:4px}
.lang-clear{font-size:11px;color:var(--text-mute);padding:0 6px}

.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:18px}
.edit-chip{font-size:11px;color:var(--primary);padding:5px 12px;border-radius:var(--radius-pill);background:var(--primary-soft);font-weight:600;display:inline-flex;align-items:center;gap:4px}

.ing-list{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:10px}
.ing-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--divider)}
.ing-row:last-child{border-bottom:none}
.ing-name{font-size:14px;color:var(--text-strong);font-weight:600;flex:1;min-width:0}
.ing-amount{font-size:14px;color:var(--text-sub);font-weight:500;margin-left:8px;flex-shrink:0}
.partner-note{font-size:11px;color:var(--text-mute);line-height:1.6;margin-bottom:18px}

.step-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.step{background:var(--card);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-sm);transition:.15s}
.step.on{background:var(--primary);color:#fff}
.step-row{display:flex;align-items:flex-start;gap:12px}
.step-num{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.step.on .step-num{background:rgba(255,255,255,.25);color:#fff}
.step-text{font-size:14px;line-height:1.7;padding-top:3px;flex:1}

.fav-cta{width:100%;height:54px;border-radius:var(--radius);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;background:var(--primary);color:#fff}
.fav-cta.on{background:var(--card);color:var(--danger);border:1.5px solid var(--danger)}

/* ── 검색 ───────────────────────────────────── */
.search-h-title{font-size:24px;font-weight:800;color:var(--text-strong);letter-spacing:-.03em;margin-bottom:4px}
.search-h-sub{font-size:13px;color:var(--text-mute);margin-bottom:20px}
.search-box{position:relative;margin-bottom:20px}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-mute);display:flex;font-size:18px}
.search-input{width:100%;height:52px;border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow-sm);padding:0 44px 0 44px;font-size:15px;letter-spacing:-.01em;color:var(--text-strong)}
.search-input:focus{box-shadow:0 0 0 2px var(--primary) inset}
.search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-mute);display:flex}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 14px;border-radius:var(--radius-pill);background:var(--card);border:1.5px solid var(--border);font-size:13px;color:var(--text-sub);font-weight:500;transition:.15s}
.chip:active{border-color:var(--primary);color:var(--primary);background:var(--primary-soft)}
.section-quick{font-size:14px;font-weight:700;color:var(--text-strong);margin-bottom:12px;letter-spacing:-.01em}
.search-list{margin-top:6px}
.search-card{background:var(--card);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px;overflow:hidden;padding:12px 14px}
.search-icon-circle{width:48px;height:48px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.search-text{flex:1;min-width:0}
.search-name{font-size:14px;font-weight:600;color:var(--text-strong);margin-bottom:2px}
.search-sub{display:flex;gap:8px;font-size:12px;color:var(--text-mute);align-items:center}
.search-sub .dot{color:var(--border)}

/* ── 즐겨찾기 탭 ───────────────────────────────── */
.tab-h-title{font-size:24px;font-weight:800;color:var(--text-strong);letter-spacing:-.03em;margin-bottom:4px}
.tab-h-sub{font-size:13px;color:var(--text-mute);margin-bottom:20px}
.fav-card{background:var(--card);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow-sm);display:flex;overflow:hidden}
.fav-bar{width:5px;flex-shrink:0}
.fav-body{padding:12px 14px;flex:1;min-width:0}
.fav-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.fav-cat-tag{font-size:11px;color:var(--text-mute);font-weight:500}
.fav-name{font-size:14px;font-weight:700;color:var(--text-strong);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.01em}
.fav-meta{font-size:12px;color:var(--text-mute);margin-top:2px}
.fav-note-text{font-size:11px;color:var(--text-sub);font-style:italic;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-rm{padding:0 16px;display:flex;align-items:center;color:var(--danger);font-size:20px;flex-shrink:0}

/* ── 빈 상태 ───────────────────────────────────── */
.empty{text-align:center;padding:60px 20px}
.empty-emoji{font-size:48px;margin-bottom:14px}
.empty-title{font-size:15px;font-weight:700;color:var(--text-sub)}
.empty-sub{font-size:13px;color:var(--text-mute);margin-top:6px}

/* ── 모달/시트 ───────────────────────────────── */
.scrim{position:fixed;inset:0;background:rgba(25,31,40,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fa .2s ease}
.sheet{background:var(--card);width:100%;max-width:440px;border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:24px;max-height:85vh;overflow-y:auto;animation:su .25s cubic-bezier(.2,.8,.2,1);box-shadow:var(--shadow-lg)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.sheet-title{font-size:18px;font-weight:800;color:var(--text-strong);letter-spacing:-.02em}
.sheet-sub{font-size:13px;color:var(--text-sub);margin:4px 0 18px}
.sheet-label{font-size:13px;font-weight:600;color:var(--text);margin:6px 0 8px}
.input{width:100%;height:48px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card);padding:0 14px;font-size:14px;color:var(--text-strong);transition:.15s}
.input:focus{border-color:var(--primary)}
.textarea{width:100%;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card);padding:12px 14px;font-size:14px;color:var(--text-strong);resize:none;font-family:inherit;line-height:1.5;transition:.15s}
.textarea:focus{border-color:var(--primary)}
.sheet-actions{display:flex;gap:10px;margin-top:18px}
.btn{height:48px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:.15s}
.btn-primary{background:var(--primary);color:#fff;flex:2}
.btn-primary:disabled{background:var(--border);color:var(--text-mute);cursor:default}
.btn-primary:active:not(:disabled){background:var(--primary-press)}
.btn-secondary{background:var(--card);border:1.5px solid var(--border);color:var(--text-sub);flex:1}
.ref-box{background:var(--bg);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:16px;font-size:12px;color:var(--text-sub);line-height:1.5}
.ref-box p{margin-bottom:2px}
.ref-label{font-weight:600;color:var(--text);margin-bottom:4px}
.sheet-error{font-size:12px;color:var(--danger);margin-bottom:12px;font-weight:600}
.sheet-done{text-align:center;padding:20px 0}
.sheet-done-emoji{font-size:48px;margin-bottom:12px}
.sheet-done-title{font-size:18px;font-weight:700;color:var(--text-strong);margin-bottom:8px}
.sheet-done-sub{font-size:13px;color:var(--text-sub);margin-bottom:20px}
.sheet-done-btn{padding:12px 32px;border-radius:var(--radius-sm);background:var(--primary);color:#fff;font-size:14px;font-weight:700;display:inline-flex}

/* ── Stars ───────────────────────────────────── */
.stars{display:inline-flex;gap:2px;line-height:1}
.star{transition:.15s}
.star.on{color:var(--warn)}
.star.off{color:var(--border)}
.star.clickable{cursor:pointer}

/* ── 네비게이션 바 ───────────────────────────── */
.navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:var(--card);border-top:1px solid var(--divider);display:flex;z-index:100;padding:8px 0 14px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--text-mute);transition:.15s}
.nav-item.on{color:var(--primary)}
.nav-icon{display:flex;font-size:24px}
.nav-label{font-size:10px;font-weight:500;letter-spacing:-.01em}
.nav-item.on .nav-label{font-weight:700}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--primary);margin-top:2px;opacity:0;transition:.15s}
.nav-item.on .nav-dot{opacity:1}

/* ── 관리자 ───────────────────────────────────── */
.admin-login{background:var(--card);border-radius:var(--radius-lg);padding:24px;margin-top:16px;box-shadow:var(--shadow-sm)}
.admin-toolbar{display:flex;align-items:center;justify-content:space-between;margin:8px 0 16px}
.admin-tip{font-size:13px;color:var(--text-sub)}
.admin-refresh{font-size:13px;color:var(--primary);font-weight:600;display:inline-flex;align-items:center;gap:4px}
.req-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.req-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.req-title{font-size:14px;font-weight:700;color:var(--text-strong);letter-spacing:-.01em}
.req-meta{font-size:12px;color:var(--text-mute);margin-bottom:8px}
.req-field{background:var(--bg);border-radius:var(--radius-sm);padding:3px 8px;margin-right:6px;font-size:11px;font-weight:500}
.req-orig{font-size:12px;color:var(--text-sub);padding:8px 12px;background:var(--danger-soft);border-radius:var(--radius-sm);margin-bottom:6px;line-height:1.5}
.req-new{font-size:13px;color:var(--text);padding:8px 12px;background:var(--primary-soft);border-radius:var(--radius-sm);margin-bottom:8px;line-height:1.5}
.req-reason{font-size:12px;color:var(--text-sub);font-style:italic;margin-top:4px}
.req-actions{display:flex;gap:8px;margin-top:10px}
.req-btn{flex:1;height:38px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;gap:4px}
.req-btn.ok{background:var(--success)}
.req-btn.no{background:var(--danger)}
/* ── 카카오 로그인 ──────────────────────────── */

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;

// ── Supabase ──────────────────────────────────
const SB_URL="https://clidlcwqpddzgjgjznea.supabase.co";
const SB_KEY="sb_publishable_4Fyvj0W8RGpzTHhwcgnzSA_9tAjFQ-0";
const ADMIN_PW="sungwon2024";

// ── 쿠팡 파트너스 ────────────────────────────
const COUPANG_AF_ID="AF7478113";
let CL_MAP={};
const coupangUrl=(k)=>{
  if(CL_MAP&&CL_MAP[k])return CL_MAP[k];
  const q=encodeURIComponent(k);
  return `https://www.coupang.com/np/search?q=${q}&sourceType=affiliate&affiliate=Y&subId=recipe&clickTracking=Y&af_id=${COUPANG_AF_ID}`;
};
const sbFetch=(p,o={})=>fetch(`${SB_URL}/rest/v1/${p}`,{headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,...(o.headers||{})},...o});

// ── 번역 ─────────────────────────────────────
const TR_CACHE={};
const _TR_SEP=' |||SEP||| ';
const _TR_SEPR=/\s*\|\|\|SEP\|\|\|\s*/;
async function trBatch(texts,target){
  const key=`${target}|${texts.join('§')}`;
  if(TR_CACHE[key])return TR_CACHE[key];
  const joined=texts.join(_TR_SEP);
  let result=texts;
  try{
    const r=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=${target}&dt=t&q=${encodeURIComponent(joined)}`);
    const data=await r.json();
    const merged=data[0].map(x=>x[0]).join('');
    result=merged.split(_TR_SEPR);
    if(result.length!==texts.length){
      result=[];
      for(const t of texts){
        try{
          const rr=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=${target}&dt=t&q=${encodeURIComponent(t)}`);
          const dd=await rr.json();
          result.push(dd[0].map(x=>x[0]).join(''));
        }catch{result.push(t);}
      }
    }
  }catch{}
  TR_CACHE[key]=result;
  return result;
}

// ── 카테고리/배지 토큰 ─────────────────────────
const CAT_C=(id)=>`var(--c${id})`;
const CAT_S=(id)=>`var(--c${id}-soft)`;
const CAT_EMOJI={1:'🍲',2:'🍱',3:'🥢',4:'🍼',5:'🍝',6:'🍜',7:'🥗'};
const BADGE_CLASS={
  인기:'badge-primary',건강:'badge-success',간단:'badge-primary',정통:'badge-warn',
  고급:'badge-warn',시그니처:'badge-warn',강추:'badge-primary',특선:'badge-warn',
  매운맛:'badge-warn',신선:'badge-success',시원함:'badge-primary',겨울:'badge-primary',
  여름:'badge-primary',브런치:'badge-warn',와인:'badge-warn',
  초기:'badge-success',중기:'badge-success',후기:'badge-success',완료기:'badge-success',
  명절:'badge-warn',준비중:'badge-mute'
};
const DIFF=["","쉬움","보통","보통+","어려움","고급"];
const LS={get:(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};
const Icon=({name,size=20,color})=>React.createElement('iconify-icon',{icon:name,style:{fontSize:size,color:color||'currentColor',display:'inline-flex'}});

// 한글 IME 안전 입력 — 검색탭에서 이미 검증된 패턴 그대로
// (line 966~970 <input ref={searchRef} onCompositionStart/End + onInput) 과 동일 구조
// - value prop 안 줌 (uncontrolled) → React가 native value를 강제 동기화하지 않음
// - 초기값/외부 변경은 defaultValue로 첫 마운트 시 1회 적용
//   (모달이 editModal && (...) 조건부라 열 때마다 새로 마운트되어 새 defaultValue 적용)
// - onCompositionStart/End로 한글 조합 중에는 setState 보류
// - onInput으로 조합 끝난 뒤·영문 입력 시에만 setState (검색탭과 정확히 동일)
const ImeInput=({value,onChange,multi,...rest})=>{
  const composingRef=React.useRef(false);
  const Tag=multi?'textarea':'input';
  return React.createElement(Tag,{
    defaultValue:value,
    onCompositionStart:()=>{composingRef.current=true;},
    onCompositionEnd:e=>{composingRef.current=false;onChange(e.target.value);},
    onInput:e=>{if(!composingRef.current)onChange(e.target.value);},
    autoComplete:'off',
    autoCapitalize:'none',
    autoCorrect:'off',
    ...rest
  });
};

const Stars=({v,onChange,size=18})=>(
  <span className="stars" style={{fontSize:size}}>
    {[1,2,3,4,5].map(s=>(
      <span key={s} className={`star ${s<=v?'on':'off'}${onChange?' clickable':''}`} onClick={()=>onChange?.(s)}>★</span>
    ))}
  </span>
);

function App(){
  const [db,setDb]=useState(null);
  const [loading,setLoading]=useState(true);
  const [cat,setCat]=useState(null);
  const [dish,setDish]=useState(null);
  const [recipe,setRecipe]=useState(null);
  const [step,setStep]=useState(null);
  const [tab,setTab]=useState("home");
  const [query,setQuery]=useState("");
  const [favs,setFavs]=useState(()=>LS.get("spa_favs",[]));
  const [ratings,setRatings]=useState(()=>LS.get("spa_ratings",{}));
  const [editModal,setEditModal]=useState(null);
  const [editValue,setEditValue]=useState("");
  const [editReason,setEditReason]=useState("");
  const [editSending,setEditSending]=useState(false);
  const [editDone,setEditDone]=useState(false);
  const [editError,setEditError]=useState("");
  const [adminUnlocked,setAdminUnlocked]=useState(()=>LS.get("spa_admin_unlock",false));
  const [adminMode,setAdminMode]=useState(()=>LS.get("spa_admin_unlock",false));
  const [adminPw,setAdminPw]=useState("");
  const [adminRequests,setAdminRequests]=useState([]);
  const [adminLoading,setAdminLoading]=useState(false);
  const [reviewModal,setReviewModal]=useState(null);
  const [draftStar,setDraftStar]=useState(0);
  const [draftNote,setDraftNote]=useState("");
  const [user,setUser]=useState(()=>LS.get("spa_user",null));
  const [welcomed,setWelcomed]=useState(()=>LS.get("spa_welcomed",false));
  const dismissWelcome=()=>{setWelcomed(true);LS.set("spa_welcomed",true);};
  const searchRef=useRef(null);
  const composingRef=useRef(false);

  const loadDb=React.useCallback(()=>{
    setLoading(true);
    fetch("./coupang_links.json").then(r=>r.ok?r.json():{}).then(m=>{CL_MAP=m||{};}).catch(()=>{})
      .finally(()=>{
        fetch("./recipes.json").then(r=>{if(!r.ok)throw new Error("http "+r.status);return r.json();})
          .then(data=>setDb(data)).catch(()=>setDb(null)).finally(()=>setLoading(false));
      });
  },[]);
  useEffect(()=>{loadDb();},[loadDb]);
  // 노트북 unlock: ?admin_setup=KEY → localStorage 저장 + URL 정리
  useEffect(()=>{
    try{
      const u=new URL(window.location.href);
      if(u.searchParams.get('admin_setup')===ADMIN_PW){
        LS.set("spa_admin_unlock",true);
        setAdminUnlocked(true);
        setAdminMode(true);
        u.searchParams.delete('admin_setup');
        window.history.replaceState({},'',u.toString());
      }
    }catch{}
  },[]);
  useEffect(()=>{LS.set("spa_favs",favs);},[favs]);
  useEffect(()=>{LS.set("spa_ratings",ratings);},[ratings]);
  useEffect(()=>{LS.set("spa_user",user);},[user]);
  // Kakao SDK 초기화
  useEffect(()=>{
    if(window.Kakao && !window.Kakao.isInitialized()){
      try{window.Kakao.init("35497f25325d1cf8a2435621b8b0dd25");}catch(e){console.error("Kakao.init 실패",e);}
    }
  },[]);
  // 카카오 OAuth redirect 복귀 처리 (URL에 ?code=… 있으면 토큰 교환 + 사용자 정보 저장)
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const code=params.get('code');
    const error=params.get('error');
    if(error){
      alert("카카오에서 거부됨: "+(params.get('error_description')||error));
      window.history.replaceState({},'',window.location.pathname);return;
    }
    if(!code)return;
    (async()=>{
      try{
        const tokenRes=await fetch('https://kauth.kakao.com/oauth/token',{
          method:'POST',
          headers:{'Content-Type':'application/x-www-form-urlencoded'},
          body:new URLSearchParams({
            grant_type:'authorization_code',
            client_id:"35497f25325d1cf8a2435621b8b0dd25",
            redirect_uri:window.location.origin+"/",
            code:code
          })
        });
        const tokenData=await tokenRes.json();
        if(!tokenData.access_token){
          alert("토큰 교환 실패: "+(tokenData.error_description||tokenData.error||JSON.stringify(tokenData)));
          window.history.replaceState({},'',window.location.pathname);return;
        }
        if(!window.Kakao.isInitialized()) window.Kakao.init("35497f25325d1cf8a2435621b8b0dd25");
        window.Kakao.Auth.setAccessToken(tokenData.access_token);
        const me=await new Promise((resolve,reject)=>{
          window.Kakao.API.request({url:'/v2/user/me',success:resolve,fail:reject});
        });
        const profile=me.kakao_account?.profile||{};
        const kakaoUser={
          kakao_id:String(me.id),
          nickname:profile.nickname||me.properties?.nickname||'카카오 사용자',
          profile_image_url:profile.profile_image_url||me.properties?.profile_image||'',
          thumbnail_image_url:profile.thumbnail_image_url||me.properties?.thumbnail_image||'',
        };
        try{
          await sbFetch('users?on_conflict=kakao_id',{
            method:'POST',
            headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},
            body:JSON.stringify({...kakaoUser,last_login_at:new Date().toISOString()})
          });
        }catch(e){console.error("Supabase upsert 실패",e);}
        setUser(kakaoUser);
        setWelcomed(true);LS.set("spa_welcomed",true);
        window.history.replaceState({},'',window.location.pathname);
      }catch(e){
        alert("로그인 처리 중 오류: "+(e.message||JSON.stringify(e)));
        window.history.replaceState({},'',window.location.pathname);
      }
    })();
  },[]);
  // 카카오 OAuth 인가 요청 - 직접 redirect (SDK authorize() 의존성 제거)
  // iOS Safari·PWA·구형 브라우저 모두에서 가장 robust한 방식
  const handleKakaoLogin=()=>{
    const params=new URLSearchParams({
      response_type:'code',
      client_id:'35497f25325d1cf8a2435621b8b0dd25',
      redirect_uri:window.location.origin+'/',
      scope:'profile_nickname,profile_image'
    });
    const authUrl='https://kauth.kakao.com/oauth/authorize?'+params.toString();
    // 페이지 전체를 카카오 로그인으로 이동 (popup 아님, 안전)
    window.location.href=authUrl;
  };
  const handleKakaoLogout=()=>{
    const done=()=>setUser(null);
    if(window.Kakao?.Auth?.getAccessToken()){window.Kakao.Auth.logout(done);}
    else{done();}
  };

  if(loading)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:10,background:"var(--card)"}}>
      <p style={{fontSize:26,fontWeight:800,color:"var(--text-strong)",letterSpacing:"-.03em"}}>오늘 뭐먹지</p>
      <p style={{fontSize:13,color:"var(--text-mute)"}}>레시피 불러오는 중...</p>
    </div>
  );
  if(!db)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24}}>
      <div style={{background:"var(--card)",borderRadius:"var(--radius-lg)",padding:28,textAlign:"center",maxWidth:360,boxShadow:"var(--shadow-sm)"}}>
        <div style={{fontSize:48,marginBottom:12}}>⚠️</div>
        <h2 style={{fontSize:18,fontWeight:700,marginBottom:8,color:"var(--text-strong)"}}>레시피를 불러오지 못했습니다</h2>
        <p style={{fontSize:13,color:"var(--text-sub)",marginBottom:20}}>네트워크 연결을 확인하고 다시 시도해주세요.</p>
        <button onClick={loadDb} className="btn btn-primary" style={{padding:"12px 28px",flex:"initial"}}>다시 시도</button>
      </div>
    </div>
  );

  // 첫 진입 시 환영 화면 (로그인 또는 둘러보기 선택 전까지)
  if(!user && !welcomed) return(
    <div className="welcome">
      <div className="welcome-emoji">🍲</div>
      <h1 className="welcome-title">오늘 뭐먹지</h1>
      <p className="welcome-sub">130가지 검증된 레시피<br/>오늘 메뉴를 골라보세요</p>
      <button onClick={handleKakaoLogin} className="kakao-btn welcome-kakao">
        <Icon name="ri:kakao-talk-fill" size={20}/>
        카카오톡으로 시작하기
      </button>
      <button onClick={dismissWelcome} className="welcome-skip">로그인 없이 둘러보기</button>
    </div>
  );

  const {cats,dishes,recipes}=db;
  const allDishes=Object.entries(dishes).flatMap(([cid,arr])=>arr.map(d=>({...d,catId:Number(cid)})));
  const allRecipes=Object.entries(recipes).flatMap(([did,arr])=>arr.map(r=>({...r,dishId:Number(did)})));
  const getCat=(id)=>cats.find(c=>c.id===id)||cats[0];
  const activeCat=cats.find(c=>c.id===cat);
  const activeDish=dish?allDishes.find(d=>d.id===dish):null;
  const activeRecipe=recipe?allRecipes.find(r=>r.id===recipe):null;
  const accentC=activeCat?CAT_C(activeCat.id):'var(--primary)';
  const accentS=activeCat?CAT_S(activeCat.id):'var(--primary-soft)';
  const isFav=(id)=>favs.includes(id);
  const toggleFav=(id)=>setFavs(f=>{const n=f.includes(id)?f.filter(x=>x!==id):[...f,id];LS.set("spa_favs",n);return n;});
  const openReview=(id)=>{const rv=ratings[id];setDraftStar(rv?.star||0);setDraftNote(rv?.note||"");setReviewModal(id);};
  const saveReview=()=>{const n={...ratings,[reviewModal]:{star:draftStar,note:draftNote}};setRatings(n);LS.set("spa_ratings",n);setReviewModal(null);};
  const favRecipes=favs.map(id=>allRecipes.find(r=>r.id===id)).filter(Boolean);
  const searchResults=query.trim().length>=1?allDishes.filter(d=>d.name.includes(query.trim())):[];
  const openDish=(d)=>{setCat(d.catId);setDish(d.id);setRecipe(null);setStep(null);setTab("home");};
  const openDishSmart=(d)=>{
    const rs=recipes[d.id]||[];
    setCat(d.catId||cat);setDish(d.id);setStep(null);setTab("home");
    setRecipe(rs.length===1?rs[0].id:null);
  };
  const openRecipe=(r)=>{setRecipe(r.id);setStep(null);setTab("home");};
  const goBack=()=>{
    if(activeRecipe){
      const single=(recipes[activeRecipe.dishId]||[]).length===1;
      setRecipe(null);setStep(null);
      if(single)setDish(null);
    }
    else if(activeDish)setDish(null);
    else if(activeCat)setCat(null);
  };
  const breadcrumb=[activeCat?.name,activeDish?.name,activeRecipe?.title].filter(Boolean);
  const inNav=tab==="home"&&(cat||dish||recipe);

  const openEdit=(r)=>{
    const ing=Array.isArray(r.ing)?r.ing:[];
    setEditModal({recipe:r,field:"ingredients",original:ing});
    setEditValue(ing.map(i=>`${i.n}: ${i.a}`).join("\n"));
    setEditReason("");setEditError("");setEditDone(false);
  };
  const submitEdit=async()=>{
    if(!editValue.trim()||!editModal)return;
    setEditError("");setEditSending(true);
    try{
      await sbFetch("edit_requests",{
        method:"POST",headers:{"Prefer":"return=minimal"},
        body:JSON.stringify({
          dish_id:editModal.recipe.dishId,recipe_id:editModal.recipe.id,
          dish_name:allDishes.find(d=>d.id===editModal.recipe.dishId)?.name||"",
          recipe_title:editModal.recipe.title,field:editModal.field,
          original_value:Array.isArray(editModal.original)?editModal.original.map(i=>i&&typeof i==="object"?`${i.n}: ${i.a}`:String(i)).join("\n"):String(editModal.original||""),
          suggested_value:editValue.trim(),reason:editReason.trim(),status:"pending"
        })
      });
      setEditDone(true);
    }catch{setEditError("전송에 실패했습니다. 네트워크를 확인하고 다시 시도해주세요.");}
    setEditSending(false);
  };

  const loginAdmin=()=>{
    if(adminPw===ADMIN_PW){setAdminMode(true);loadAdminRequests();}
    else alert("비밀번호가 틀렸습니다.");
  };
  const loadAdminRequests=async()=>{
    setAdminLoading(true);
    try{
      const r=await sbFetch("edit_requests?order=created_at.desc&select=*");
      const data=await r.json();
      setAdminRequests(Array.isArray(data)?data:[]);
    }catch{}
    setAdminLoading(false);
  };
  const updateRequest=async(id,status)=>{
    await sbFetch(`edit_requests?id=eq.${id}`,{method:"PATCH",headers:{"Prefer":"return=minimal"},body:JSON.stringify({status})});
    loadAdminRequests();
  };

  // ── RecipeCard ─────────────────────────────
  const RecipeCard=({r})=>{
    const cls=r.badge?BADGE_CLASS[r.badge]||'badge-primary':'';
    const rv=ratings[r.id];
    return(
      <div onClick={()=>openRecipe(r)} className="recipe-card">
        <div className="recipe-bar" style={{background:accentC}}/>
        <div className="recipe-body">
          <div className="recipe-head">
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span className="recipe-title">{r.title}</span>
                {r.badge&&<span className={`badge ${cls}`}>{r.badge}</span>}
              </div>
              {r.desc&&<p className="recipe-desc">{r.desc}</p>}
              <div className="recipe-meta">
                {r.time>0&&<span className="meta-item"><Icon name="solar:clock-circle-bold" size={14}/>{r.time}분</span>}
                {r.diff>0&&<span className="meta-item"><Icon name="solar:fire-bold" size={14}/>{DIFF[r.diff]}</span>}
                {r.author&&<span className="meta-item"><Icon name="solar:user-bold" size={14}/>{r.author}</span>}
                {rv&&<Stars v={rv.star} size={13}/>}
              </div>
            </div>
            <button onClick={e=>{e.stopPropagation();toggleFav(r.id);}} className={`fav-btn ${isFav(r.id)?'on':''}`}>
              {isFav(r.id)?'❤':'♡'}
            </button>
          </div>
          {rv?.note&&<div className="review-note">📝 {rv.note}</div>}
        </div>
      </div>
    );
  };

  // ── RecipeDetail ───────────────────────────
  const RecipeDetail=()=>{
    const r=activeRecipe;if(!r)return null;
    const rv=ratings[r.id];
    const cls=r.badge?BADGE_CLASS[r.badge]||'badge-primary':'';
    const [trLang,setTrLang]=React.useState(null);
    const [trData,setTrData]=React.useState(null);
    const [trLoading,setTrLoading]=React.useState(false);
    const LANGS=[{code:'en',label:'English'},{code:'ja',label:'日本語'},{code:'zh-CN',label:'中文'}];
    const handleTr=async(lang)=>{
      if(trLang===lang){setTrLang(null);setTrData(null);return;}
      setTrLoading(true);setTrLang(lang);setTrData(null);
      try{
        const ingNames=(r.ing||[]).map(i=>i.n);
        const texts=[r.title,...ingNames,...(r.steps||[])];
        const translated=await trBatch(texts,lang);
        if(translated.length===texts.length){
          const trTitle=translated[0]||r.title;
          const trIng=r.ing.map((i,idx)=>({...i,n:translated[1+idx]||i.n}));
          const trSteps=translated.slice(1+ingNames.length);
          setTrData({title:trTitle,ing:trIng,steps:trSteps.length===r.steps.length?trSteps:r.steps});
        }
      }catch{}
      setTrLoading(false);
    };
    const _d=trData||r;
    const disp={..._d,ing:Array.isArray(_d.ing)?_d.ing:[],steps:Array.isArray(_d.steps)?_d.steps:[]};
    return(
      <div className="fade">
        {/* 번역 */}
        <div className="lang-row">
          <span className="lang-lbl">번역</span>
          {LANGS.map(({code,label})=>(
            <button key={code} onClick={()=>handleTr(code)} disabled={trLoading} className={`lang-btn ${trLang===code?'on':''}`}>{label}</button>
          ))}
          {trLoading&&<span className="lang-clear">번역 중...</span>}
          {trLang&&!trLoading&&<button onClick={()=>{setTrLang(null);setTrData(null);}} className="lang-clear">원문</button>}
        </div>
        {/* Hero */}
        <div className="detail-hero">
          <div className="detail-hero-bar" style={{background:accentC}}/>
          <div className="detail-hero-top">
            {r.badge?<span className={`badge ${cls}`}>{r.badge}</span>:<span/>}
            <button onClick={()=>openReview(r.id)} className="review-cta">
              <Icon name={rv?'solar:pen-bold':'solar:star-bold'} size={14}/>{rv?'후기 수정':'후기 남기기'}
            </button>
          </div>
          <h2 className="detail-title">{disp.title||r.title}</h2>
          {r.desc&&<p className="detail-desc">{r.desc}</p>}
          {rv&&(
            <div className="review-card">
              <div className="review-row"><Stars v={rv.star} size={15}/></div>
              {rv.note&&<p className="review-note-text">"{rv.note}"</p>}
            </div>
          )}
          <div className="detail-stats">
            <div className="stat">
              <div className="stat-val">{r.time>0?`${r.time}분`:'-'}</div>
              <div className="stat-lbl">소요</div>
            </div>
            <div className="stat">
              <div className="stat-val">{r.diff>0?`${r.diff}/5`:'-'}</div>
              <div className="stat-lbl">난이도</div>
            </div>
            <div className="stat">
              <div className="stat-val" style={{fontSize:13}}>{r.author||'-'}</div>
              <div className="stat-lbl">작성자</div>
            </div>
          </div>
          {r.source&&r.source.startsWith("http")&&(
            <a href={r.source} target="_blank" rel="noopener noreferrer" className="source-btn">
              <Icon name="solar:videocamera-record-bold" size={16}/>원본 레시피 보기
            </a>
          )}
        </div>

        {/* 재료 */}
        {disp.ing.length>0&&(
          <>
            <div className="section-head">
              <h3 className="section-title"><Icon name="solar:salt-bold" size={18}/>재료</h3>
              <button onClick={()=>openEdit(r)} className="edit-chip"><Icon name="solar:pen-bold" size={12}/>수정 제안</button>
            </div>
            <div className="ing-list">
              {disp.ing.map((ing,i)=>{
                const origName=r.ing[i]?.n||ing.n;
                return(
                  <a key={i} href={coupangUrl(origName)} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} className="ing-row" style={{cursor:'pointer'}}>
                    <span className="ing-name">{ing.n}</span>
                    <span className="ing-amount">{ing.a}</span>
                  </a>
                );
              })}
            </div>
            <p className="partner-note">이 사이트는 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</p>
          </>
        )}

        {/* 조리 순서 */}
        {disp.steps.length>0&&(
          <>
            <div className="section-head">
              <h3 className="section-title"><Icon name="solar:chef-hat-bold" size={18}/>조리 순서</h3>
            </div>
            <div className="step-list">
              {disp.steps.map((s,i)=>{
                const n=i+1;
                return(
                  <div key={i} onClick={()=>setStep(step===n?null:n)} className={`step ${step===n?'on':''}`}>
                    <div className="step-row">
                      <div className="step-num">{n}</div>
                      <p className="step-text">{s}</p>
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        )}

        {/* 즐겨찾기 CTA */}
        <button onClick={()=>toggleFav(r.id)} className={`fav-cta ${isFav(r.id)?'on':''}`}>
          <Icon name={isFav(r.id)?"solar:heart-broken-bold":"solar:heart-bold"} size={18}/>
          {isFav(r.id)?'즐겨찾기 해제':'즐겨찾기 추가'}
        </button>
      </div>
    );
  };

  // ── HomeContent ────────────────────────────
  const HomeContent=()=>{
    if(activeRecipe)return<RecipeDetail/>;
    if(dish){
      const list=recipes[dish]||[];
      return(
        <div className="fade">
          <p className="list-count">{list.length}가지 레시피</p>
          {list.length>0?list.map(r=><RecipeCard key={r.id} r={r}/>):
            <div className="empty"><div className="empty-emoji">🔜</div><p className="empty-title">레시피 준비 중</p></div>}
        </div>
      );
    }
    if(cat){
      const list=dishes[cat]||[];
      return(
        <div className="fade">
          <p className="list-count">{list.length}가지 요리</p>
          <div className="dish-card">
            {list.map(d=>(
              <div key={d.id} onClick={()=>openDishSmart(d)} className="dish-row" style={{cursor:'pointer'}}>
                <div className="dish-bar" style={{background:accentC}}/>
                <div className="dish-text">
                  <div className="dish-name">{d.name}</div>
                  {recipes[d.id]&&<div className="dish-sub">{recipes[d.id].length}가지 레시피</div>}
                </div>
                <Icon name="solar:alt-arrow-right-line-duotone" size={18} color="var(--text-mute)"/>
              </div>
            ))}
          </div>
        </div>
      );
    }
    return(
      <div className="fade">
        <div className="cat-grid">
          {cats.map(c=>(
            <div key={c.id} onClick={()=>setCat(c.id)} className="cat-card" style={{cursor:'pointer'}}>
              <div className="cat-emoji">{CAT_EMOJI[c.id]||c.e||'🍽️'}</div>
              <div className="cat-bot">
                <span className="cat-chip" style={{background:CAT_S(c.id),color:CAT_C(c.id)}}>{(dishes[c.id]||[]).length}가지</span>
                <span className="cat-name">{c.name}</span>
              </div>
            </div>
          ))}
        </div>
        {favRecipes.length>0&&(
          <div>
            <div className="section-title-row">
              <h3 className="section-title"><Icon name="solar:heart-bold" size={18} color="var(--danger)"/>최근 즐겨찾기</h3>
              <button onClick={()=>setTab("favs")} className="section-more">전체 보기</button>
            </div>
            {favRecipes.slice(-3).reverse().map(r=>{
              const d=allDishes.find(d=>recipes[d.id]?.some(x=>x.id===r.id));
              const cid=d?.catId||1;
              return(
                <div key={r.id} onClick={()=>openRecipe(r)} className="mini-fav" style={{cursor:'pointer'}}>
                  <div className="mini-dot" style={{background:CAT_S(cid)}}>{CAT_EMOJI[cid]||'🍽️'}</div>
                  <div className="mini-text">
                    <div className="mini-name">{r.title}</div>
                    <div className="mini-meta">{r.time>0?`${r.time}분`:'-'}</div>
                  </div>
                  {ratings[r.id]&&<Stars v={ratings[r.id].star} size={13}/>}
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  // ── 검색 결과 ───────────────────────────────
  const SearchResults=()=>(
    <>
      {query.trim().length>=1?(
        <>
          <p className="list-count">{searchResults.length>0?`"${query}" 검색 결과 ${searchResults.length}건`:`"${query}"에 해당하는 음식이 없습니다`}</p>
          <div className="search-list">
            {searchResults.map(d=>{
              const c=getCat(d.catId);
              return(
                <div key={d.id} onClick={()=>openDish(d)} className="search-card" style={{cursor:'pointer'}}>
                  <div className="search-icon-circle" style={{background:CAT_S(d.catId)}}>{CAT_EMOJI[d.catId]||'🍽️'}</div>
                  <div className="search-text">
                    <div className="search-name">{d.name}</div>
                    <div className="search-sub">
                      <span>{c.name}</span><span className="dot">·</span><span>{(recipes[d.id]||[]).length}가지 레시피</span>
                    </div>
                  </div>
                  <Icon name="solar:alt-arrow-right-line-duotone" size={18} color="var(--text-mute)"/>
                </div>
              );
            })}
          </div>
        </>
      ):(
        <>
          <p className="section-quick">자주 찾는 음식</p>
          <div className="chip-row">
            {["닭갈비","굴배춧국","바지락술찜","감바스","세비체","뽈뽀","항정살","두부김치","팟타이","까망베르","뱅쇼","크림관자","육회","오므라이스","중화냉면","굴튀김"].map(w=>(
              <button key={w} onClick={()=>{setQuery(w);if(searchRef.current)searchRef.current.value=w;}} className="chip">{w}</button>
            ))}
          </div>
        </>
      )}
    </>
  );

  // ── 즐겨찾기 탭 ─────────────────────────────
  const FavsTab=()=>(
    <div className="fade">
      <h2 className="tab-h-title">즐겨찾기</h2>
      <p className="tab-h-sub">내가 저장한 레시피 모음</p>
      {!user?(
        <div className="login-card">
          <p className="login-card-title">카카오톡으로 로그인</p>
          <p className="login-card-sub">로그인하면 닉네임·프로필이 표시되고<br/>다른 기기에서도 동기화할 수 있어요</p>
          <button onClick={handleKakaoLogin} className="kakao-btn">
            <Icon name="ri:kakao-talk-fill" size={20}/>
            카카오톡으로 시작하기
          </button>
        </div>
      ):(
        <div className="profile-card">
          {user.thumbnail_image_url?
            <img src={user.thumbnail_image_url} className="profile-img" alt={user.nickname}/>:
            <div className="profile-img-fallback">👤</div>}
          <div className="profile-text">
            <div className="profile-name">{user.nickname||'카카오 사용자'}</div>
            <div className="profile-meta">카카오 로그인됨</div>
          </div>
          <button onClick={handleKakaoLogout} className="logout-btn">로그아웃</button>
        </div>
      )}
      {favRecipes.length===0?(
        <div className="empty">
          <div className="empty-emoji">🤍</div>
          <p className="empty-title">아직 저장된 레시피가 없어요</p>
          <p className="empty-sub">레시피에서 하트 버튼을 눌러보세요</p>
        </div>
      ):favRecipes.map(r=>{
        const d=allDishes.find(d=>recipes[d.id]?.some(x=>x.id===r.id));
        const c=d?getCat(d.catId):cats[0];
        const rv=ratings[r.id];
        return(
          <div key={r.id} onClick={()=>openRecipe(r)} className="fav-card" style={{cursor:'pointer'}}>
            <div className="fav-bar" style={{background:CAT_C(d?.catId||1)}}/>
            <div className="fav-body">
              <div className="fav-row1">
                <span className="fav-cat-tag">{c.name}</span>
                {rv&&<Stars v={rv.star} size={12}/>}
              </div>
              <div className="fav-name">{r.title}</div>
              <div className="fav-meta">{r.time>0?`${r.time}분`:'-'} · {DIFF[r.diff]||'-'}</div>
              {rv?.note&&<p className="fav-note-text">"{rv.note}"</p>}
            </div>
            <button onClick={e=>{e.stopPropagation();toggleFav(r.id);}} className="fav-rm">♥</button>
          </div>
        );
      })}
    </div>
  );

  // ── 관리자 탭 ──────────────────────────────
  const AdminTab=()=>(
    <div className="fade">
      <h2 className="tab-h-title">관리자</h2>
      {!adminMode?(
        <div className="admin-login">
          <p style={{fontSize:14,color:"var(--text-sub)",marginBottom:14}}>관리자 비밀번호를 입력하세요</p>
          <input type="password" value={adminPw} onChange={e=>setAdminPw(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&loginAdmin()} placeholder="비밀번호" className="input" style={{marginBottom:10}}/>
          <button onClick={loginAdmin} className="btn btn-primary" style={{width:"100%",flex:"initial"}}>로그인</button>
        </div>
      ):(
        <div>
          <div className="admin-toolbar">
            <p className="admin-tip">수정 요청 목록</p>
            <button onClick={loadAdminRequests} className="admin-refresh"><Icon name="solar:refresh-bold" size={14}/>새로고침</button>
          </div>
          {adminLoading?<div className="empty"><p className="empty-title">로딩 중...</p></div>:
          adminRequests.length===0?<div className="empty"><div className="empty-emoji">📭</div><p className="empty-title">수정 요청이 없습니다</p></div>:
          adminRequests.map(req=>{
            const cls=req.status==="pending"?"badge-warn":req.status==="approved"?"badge-success":"badge-mute";
            const label=req.status==="pending"?"대기중":req.status==="approved"?"승인됨":"거절됨";
            return(
              <div key={req.id} className="req-card">
                <div className="req-head">
                  <span className="req-title">{req.recipe_title}</span>
                  <span className={`badge ${cls}`}>{label}</span>
                </div>
                <div className="req-meta">
                  <span className="req-field">{req.field}</span>{new Date(req.created_at).toLocaleDateString("ko-KR")}
                </div>
                {req.original_value&&<div className="req-orig">기존: {req.original_value.substring(0,100)}{req.original_value.length>100?"...":""}</div>}
                <div className="req-new">수정안: {req.suggested_value}</div>
                {req.reason&&<div className="req-reason">이유: {req.reason}</div>}
                {req.status==="pending"&&(
                  <div className="req-actions">
                    <button onClick={()=>updateRequest(req.id,"approved")} className="req-btn ok"><Icon name="solar:check-circle-bold" size={14}/>승인</button>
                    <button onClick={()=>updateRequest(req.id,"rejected")} className="req-btn no"><Icon name="solar:close-circle-bold" size={14}/>거절</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  // ── 네비게이션 바 ──────────────────────────
  const NavBar=()=>(
    <div className="navbar">
      {[
        {key:"home",label:"홈",icon:"solar:home-2-bold"},
        {key:"search",label:"검색",icon:"solar:magnifer-bold"},
        {key:"favs",label:`즐겨찾기${favs.length>0?` ${favs.length}`:""}`,icon:"solar:heart-bold"},
        ...(adminUnlocked?[{key:"admin",label:"관리자",icon:"solar:shield-user-bold"}]:[]),
      ].map(n=>(
        <button key={n.key} onClick={()=>{setTab(n.key);if(n.key==="home"){setCat(null);setDish(null);setRecipe(null);setStep(null);}if(n.key==="search")setTimeout(()=>searchRef.current?.focus(),100);}} className={`nav-item ${tab===n.key?'on':''}`}>
          <span className="nav-icon"><Icon name={n.icon} size={22}/></span>
          <span className="nav-label">{n.label}</span>
          <span className="nav-dot"/>
        </button>
      ))}
    </div>
  );

  // EditModal/ReviewModal: App 안 함수형 컴포넌트로 두면 매 setState→리렌더마다
  // 새 함수 reference로 unmount/remount되며 ImeInput이 새로 마운트되어 한 글자만 입력되고

  return(
    <div className="app">
      <div className="header">
        {inNav?(
          <div className="h-nav">
            <button onClick={goBack} className="h-back"><Icon name="solar:alt-arrow-left-line-duotone" size={22}/></button>

              <div className="h-crumb">{breadcrumb.join(" › ")}</div>

        ):(
          <div className="h-row">
            <div>
              <h1 className="h-title">{tab==="search"?"검색":tab==="favs"?"즐겨찾기":tab==="admin"?"관리자":"오늘 뭐먹지"}</h1>
              {tab==="home"&&<p className="h-sub">레시피 컬렉션</p>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {user&&(user.thumbnail_image_url?
                <img src={user.thumbnail_image_url} className="h-profile" alt={user.nickname} onClick={()=>setTab("favs")}/>:
                <div className="h-profile" style={{display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,cursor:'pointer'}} onClick={()=>setTab("favs")}>👤</div>

              {tab==="home"&&(
                <button onClick={()=>setTab("search")} className="h-icon-btn"><Icon name="solar:magnifer-line-duotone" size={20}/></button>
              )}
            </div>
          </div>

      </div>

      <div className="main">
        {tab==="home"&&<HomeContent/>}
        {tab==="search"&&(
          <div className="fade">

            <p className="search-h-sub">음식 이름으로 바로 찾기</p>
            <div className="search-box">
              <span className="search-icon"><Icon name="solar:magnifer-line-duotone" size={20}/></span>
              <input ref={searchRef}

        {tab==="favs"&&<FavsTab/>}
        {tab==="admin"&&<AdminTab/>}
      </div>

      <NavBar/>
      {editModal && (
        <div className="scrim" onClick={e=>{if(e.target===e.currentTarget)setEditModal(null);}}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-handle"/>
            {editDone?(
              <div className="sheet-done">
                <div className="sheet-done-emoji">✅</div>
                <h3 className="sheet-done-title">수정 요청 완료!</h3>
                <p className="sheet-done-sub">관리자 검토 후 반영됩니다.</p>
                <button onClick={()=>setEditModal(null)} className="sheet-done-btn">닫기</button>
              </div>
            ):(
              <>
                <h3 className="sheet-title">재료 수정 제안</h3>
                <p className="sheet-sub">{editModal.recipe.title}</p>
                <div className="ref-box">
                  <p className="ref-label">현재 재료</p>
                  {editModal.original.map((ing,i)=><p key={i}>{ing.n}: {ing.a}</p>)}
                </div>
                <p className="sheet-label">수정 내용 <span style={{color:"var(--danger)"}}>*</span></p>
                <ImeInput multi value={editValue} onChange={setEditValue} maxLength={1000}
                  placeholder={"재료명: 양 형식으로 한 줄에 하나씩 작성\n(예시)\n된장: 2큰술\n두부: 1/2모"}
                  className="textarea" style={{height:120,marginBottom:12}}/>
                <p className="sheet-label">수정 이유 (선택)</p>
                <ImeInput value={editReason} onChange={setEditReason} maxLength={200}
                  placeholder="예: 분량이 너무 많아요, 재료가 빠졌어요" className="input" style={{marginBottom:editError?8:16}}/>
                {editError&&<p className="sheet-error">{editError}</p>}
                <div className="sheet-actions">
                  <button onClick={()=>setEditModal(null)} className="btn btn-secondary">취소</button>
                  <button onClick={submitEdit} disabled={!editValue.trim()||editSending} className="btn btn-primary">
                    {editSending?"전송 중...":"제안 보내기"}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
      {reviewModal && (
        <div className="scrim" onClick={e=>{if(e.target===e.currentTarget)setReviewModal(null);}}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-handle"/>
            <h3 className="sheet-title">레시피 후기 남기기</h3>
            <p className="sheet-sub">{allRecipes.find(r=>r.id===reviewModal)?.title}</p>
            <p className="sheet-label">맛 평점</p>
            <Stars v={draftStar} onChange={setDraftStar} size={32}/>
            <p className="sheet-label" style={{marginTop:16}}>메모 (선택)</p>
            <ImeInput multi value={draftNote} onChange={setDraftNote} placeholder="어떤 점이 좋았나요?" className="textarea" style={{height:80}}/>
            <div className="sheet-actions">
              <button onClick={()=>setReviewModal(null)} className="btn btn-secondary">취소</button>
              <button onClick={saveReview} disabled={!draftStar} className="btn btn-primary">저장하기</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js'));
  }
</script>
</body>
</html>
