<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="오늘 뭐먹지"/>
<meta name="theme-color" content="#F2F4F6"/>
<title>오늘 뭐먹지</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.svg"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css"/>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
<style>
:root{
  --bg:#F2F4F6;--card:#FFFFFF;
  --text-strong:#191F28;--text:#333D4B;--text-sub:#6B7684;--text-mute:#8B95A1;
  --primary:#3182F6;--primary-soft:#E8F3FF;--primary-press:#2470d6;
  --warn:#FF9500;--warn-soft:#FFF4E5;
  --danger:#F04452;--danger-soft:#FDECEE;
  --success:#00C896;--success-soft:#E5F8F2;
  --divider:#F2F4F6;--border:#E5E8EB;
  --radius-sm:8px;--radius:14px;--radius-lg:20px;--radius-pill:999px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 12px rgba(0,0,0,.06);
  --shadow-lg:0 30px 60px -20px rgba(0,0,0,.15);
  /* 카테고리 토큰 */
  --c1:#E8412A;--c1-soft:#FFF1EF; /* 한식 */
  --c2:#2C3E50;--c2-soft:#EEF1F4; /* 일식 */
  --c3:#E67E22;--c3-soft:#FEF3E7; /* 중식 */
  --c4:#27AE60;--c4-soft:#EAF7EF; /* 이유식 */
  --c5:#8E44AD;--c5-soft:#F5EEF8; /* 양식 */
  --c6:#D35400;--c6-soft:#FEF0E7; /* 분식 */
  --c7:#16A085;--c7-soft:#E8F8F5; /* 베트남 */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  letter-spacing:-0.01em;-webkit-font-smoothing:antialiased}
button,input,textarea,select{outline:none;font-family:inherit;color:inherit;border:none;background:none}
/* 키보드 포커스 표시 복원 (마우스 클릭엔 안 뜨고 Tab 이동 시에만) — WCAG 2.4.7 */
a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:6px}
button{cursor:pointer}
img{display:block;max-width:100%}
a{text-decoration:none;color:inherit}
#root{min-height:100%}
.app{max-width:440px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:96px}
.fade{animation:fu .2s ease forwards}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fa{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ── 헤더 ───────────────────────────────────── */
.header{background:var(--card);padding:14px 18px;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--divider)}
.h-row{display:flex;align-items:center;justify-content:space-between}
.h-title{font-size:22px;font-weight:800;color:var(--text-strong);letter-spacing:-.03em}
.h-sub{font-size:12px;color:var(--text-mute);margin-top:2px;letter-spacing:-.01em}
.h-icon-btn{width:40px;height:40px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--text-sub);transition:.15s}
.h-icon-btn:active{background:var(--primary-soft);color:var(--primary)}
.h-nav{display:flex;align-items:center;gap:10px}
.h-back{padding:4px;display:flex;color:var(--text-strong)}
.h-crumb{font-size:11px;color:var(--text-mute);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.01em}
.h-current{font-size:17px;font-weight:700;color:var(--text-strong);letter-spacing:-.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.main{padding:16px 16px 30px}

/* ── 카테고리 그리드 ───────────────────────────── */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.cat-card{background:var(--card);border-radius:var(--radius-lg);padding:18px 16px;display:flex;flex-direction:column;justify-content:space-between;gap:14px;min-height:130px;box-shadow:var(--shadow-sm);transition:.15s}
.cat-card:active{transform:scale(.98);box-shadow:var(--shadow)}
.cat-emoji{font-size:38px;line-height:1}
.cat-bot{display:flex;flex-direction:column;gap:6px}
.cat-name{font-size:15px;font-weight:700;color:var(--text-strong);letter-spacing:-.02em}
.cat-chip{align-self:flex-start;padding:4px 10px;border-radius:var(--radius-pill);font-size:11px;font-weight:600}

/* ── 즐겨찾기 미리보기 (홈) ───────────────────── */
.section-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:16px;font-weight:800;color:var(--text-strong);letter-spacing:-.02em;display:flex;align-items:center;gap:6px}
.section-more{font-size:13px;color:var(--primary);font-weight:600}
.mini-fav{background:var(--card);border-radius:var(--radius);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm)}
.mini-dot{width:38px;height:38px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.mini-text{flex:1;min-width:0}
.mini-name{font-size:14px;font-weight:600;color:var(--text-strong);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-meta{font-size:12px;color:var(--text-mute);margin-top:2px}

/* ── 음식 리스트 ───────────────────────────────── */
.list-count{font-size:13px;color:var(--text-mute);margin-bottom:12px;letter-spacing:-.01em}
.dish-card{background:var(--card);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm)}
.dish-row{display:flex;align-items:center;padding:14px 16px;gap:14px;border-bottom:1px solid var(--divider)}
.dish-row:last-child{border-bottom:none}
.dish-bar{width:5px;height:30px;border-radius:3px;flex-shrink:0}
.dish-text{flex:1;min-width:0}
.dish-name{font-size:15px;font-weight:600;color:var(--text-strong);letter-spacing:-.01em}
.dish-sub{font-size:12px;color:var(--text-mute);margin-top:2px}

/* ── RecipeCard ───────────────────────────────── */
.recipe-card{background:var(--card);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;transition:.15s}
.recipe-card:active{box-shadow:var(--shadow)}
.recipe-bar{position:absolute;left:0;top:14px;bottom:14px;width:4px;border-radius:0 3px 3px 0}
.recipe-body{padding-left:10px}
.recipe-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:4px}
.recipe-title{font-size:16px;font-weight:700;color:var(--text-strong);letter-spacing:-.02em}
.recipe-desc{font-size:13px;color:var(--text-sub);line-height:1.55;margin:6px 0 10px}
.recipe-meta{display:flex;gap:14px;font-size:12px;color:var(--text-mute);align-items:center;flex-wrap:wrap}
.meta-item{display:inline-flex;align-items:center;gap:4px}
.badge{font-size:11px;padding:3px 10px;border-radius:var(--radius-pill);font-weight:600;flex-shrink:0}
.badge-primary{background:var(--primary-soft);color:var(--primary)}
.badge-warn{background:var(--warn-soft);color:var(--warn)}
.badge-success{background:var(--success-soft);color:var(--success)}
.badge-mute{background:var(--bg);color:var(--text-sub)}
.fav-btn{font-size:22px;line-height:1;flex-shrink:0;color:var(--text-mute);transition:.15s}
.fav-btn.on{color:var(--danger)}
.review-note{background:var(--bg);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;color:var(--text-sub);margin-top:10px;font-style:italic}
/* 레시피 상세 후기 박스 (이전엔 클래스 미정의로 무스타일 렌더됨 — U1 수정) */
.review-card{background:var(--bg);border-radius:var(--radius);padding:14px 16px;margin:14px 0 0;border:1px solid var(--divider)}
.review-row{display:flex;align-items:center;gap:8px}
.review-note-text{margin:8px 0 0;font-size:14px;line-height:1.55;color:var(--text);font-style:italic}

/* ── RecipeDetail ─────────────────────────────── */
.detail-hero{background:var(--card);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.detail-hero-bar{position:absolute;left:0;top:0;bottom:0;width:5px}
.detail-hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.detail-title{font-size:22px;font-weight:800;color:var(--text-strong);letter-spacing:-.03em;margin-bottom:6px;line-height:1.3}
.detail-desc{font-size:14px;color:var(--text-sub);line-height:1.55;margin-bottom:16px}
.detail-stats{display:flex;background:var(--bg);border-radius:var(--radius);padding:14px 0;margin-bottom:12px}
.stat{flex:1;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-val{font-size:16px;font-weight:800;color:var(--text-strong);letter-spacing:-.02em}
.stat-lbl{font-size:11px;color:var(--text-mute);margin-top:2px}
.source-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--primary);color:#fff;border-radius:var(--radius);font-size:14px;font-weight:700;margin-top:12px}
.source-btn:active{background:var(--primary-press)}

.review-cta{font-size:12px;padding:7px 14px;border-radius:var(--radius-pill);background:var(--primary-soft);color:var(--primary);font-weight:600;display:inline-flex;align-items:center;gap:4px}

.lang-row{display:flex;gap:6px;margin-bottom:14px;align-items:center;overflow-x:auto;padding-bottom:2px}
.lang-btn{flex-shrink:0;padding:6px 14px;border-radius:var(--radius-pill);background:var(--card);color:var(--text-sub);font-size:12px;font-weight:500;border:1.5px solid var(--border);transition:.15s}
.lang-btn.on{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:700}
.lang-lbl{font-size:11px;color:var(--text-mute);flex-shrink:0;margin-right:4px}
.lang-clear{font-size:11px;color:var(--text-mute);padding:0 6px}

.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:18px}
.edit-chip{font-size:11px;color:var(--primary);padding:5px 12px;border-radius:var(--radius-pill);background:var(--primary-soft);font-weight:600;display:inline-flex;align-items:center;gap:4px}

.ing-list{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:10px}
.ing-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--divider)}
.ing-row:last-child{border-bottom:none}
.ing-name{font-size:14px;color:var(--text-strong);font-weight:600;flex:1;min-width:0}
.ing-amount{font-size:14px;color:var(--text-sub);font-weight:500;margin-left:8px;flex-shrink:0}
.partner-note{font-size:11px;color:var(--text-mute);line-height:1.6;margin-bottom:18px}

.step-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.step{background:var(--card);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-sm);transition:.15s}
.step.on{background:var(--primary);color:#fff}
.step-row{display:flex;align-items:flex-start;gap:12px}
.step-num{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.step.on .step-num{background:rgba(255,255,255,.25);color:#fff}
.step-text{font-size:14px;line-height:1.7;padding-top:3px;flex:1}

.fav-cta{width:100%;height:54px;border-radius:var(--radius);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;background:var(--primary);color:#fff}
.fav-cta.on{background:var(--card);color:var(--danger);border:1.5px solid var(--danger)}

/* ── 검색 ───────────────────────────────────── */
.search-h-title{font-size:24px;font-weight:800;color:var(--text-strong);letter-spacing:-.03em;margin-bottom:4px}
.search-h-sub{font-size:13px;color:var(--text-mute);margin-bottom:20px}
.search-box{position:relative;margin-bottom:20px}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-mute);display:flex;font-size:18px}
.search-input{width:100%;height:52px;border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow-sm);padding:0 44px 0 44px;font-size:15px;letter-spacing:-.01em;color:var(--text-strong)}
.search-input:focus{box-shadow:0 0 0 2px var(--primary) inset}
.search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-mute);display:flex}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 14px;border-radius:var(--radius-pill);background:var(--card);border:1.5px solid var(--border);font-size:13px;color:var(--text-sub);font-weight:500;transition:.15s}
.chip:active{border-color:var(--primary);color:var(--primary);background:var(--primary-soft)}
.section-quick{font-size:14px;font-weight:700;color:var(--text-strong);margin-bottom:12px;letter-spacing:-.01em}
.search-list{margin-top:6px}
.search-card{background:var(--card);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px;overflow:hidden;padding:12px 14px}
.search-icon-circle{width:48px;height:48px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.search-text{flex:1;min-width:0}
.search-name{font-size:14px;font-weight:600;color:var(--text-strong);margin-bottom:2px}
.search-sub{display:flex;gap:8px;font-size:12px;color:var(--text-mute);align-items:center}
.search-sub .dot{color:var(--border)}

/* ── 즐겨찾기 탭 ───────────────────────────────── */
.tab-h-title{font-size:24px;font-weight:800;color:var(--text-strong);letter-spacing:-.03em;margin-bottom:4px}
.tab-h-sub{font-size:13px;color:var(--text-mute);margin-bottom:20px}
.fav-card{background:var(--card);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow-sm);display:flex;overflow:hidden}
.fav-bar{width:5px;flex-shrink:0}
.fav-body{padding:12px 14px;flex:1;min-width:0}
.fav-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.fav-cat-tag{font-size:11px;color:var(--text-mute);font-weight:500}
.fav-name{font-size:14px;font-weight:700;color:var(--text-strong);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.01em}
.fav-meta{font-size:12px;color:var(--text-mute);margin-top:2px}
.fav-note-text{font-size:11px;color:var(--text-sub);font-style:italic;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-rm{padding:0 16px;display:flex;align-items:center;color:var(--danger);font-size:20px;flex-shrink:0}

/* ── 빈 상태 ───────────────────────────────────── */
.empty{text-align:center;padding:60px 20px}
.empty-emoji{font-size:48px;margin-bottom:14px}
.empty-title{font-size:15px;font-weight:700;color:var(--text-sub)}
.empty-sub{font-size:13px;color:var(--text-mute);margin-top:6px}

/* ── 모달/시트 ───────────────────────────────── */
.scrim{position:fixed;inset:0;background:rgba(25,31,40,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fa .2s ease}
.sheet{background:var(--card);width:100%;max-width:440px;border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:24px;max-height:85vh;overflow-y:auto;animation:su .25s cubic-bezier(.2,.8,.2,1);box-shadow:var(--shadow-lg)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.sheet-title{font-size:18px;font-weight:800;color:var(--text-strong);letter-spacing:-.02em}
.sheet-sub{font-size:13px;color:var(--text-sub);margin:4px 0 18px}
.sheet-label{font-size:13px;font-weight:600;color:var(--text);margin:6px 0 8px}
.input{width:100%;height:48px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card);padding:0 14px;font-size:14px;color:var(--text-strong);transition:.15s}
.input:focus{border-color:var(--primary)}
.textarea{width:100%;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card);padding:12px 14px;font-size:14px;color:var(--text-strong);resize:none;font-family:inherit;line-height:1.5;transition:.15s}
.textarea:focus{border-color:var(--primary)}
.sheet-actions{display:flex;gap:10px;margin-top:18px}
.btn{height:48px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:.15s}
.btn-primary{background:var(--primary);color:#fff;flex:2}
.btn-primary:disabled{background:var(--border);color:var(--text-mute);cursor:default}
.btn-primary:active:not(:disabled){background:var(--primary-press)}
.btn-secondary{background:var(--card);border:1.5px solid var(--border);color:var(--text-sub);flex:1}
.ref-box{background:var(--bg);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:16px;font-size:12px;color:var(--text-sub);line-height:1.5}
.ref-box p{margin-bottom:2px}
.ref-label{font-weight:600;color:var(--text);margin-bottom:4px}
.sheet-error{font-size:12px;color:var(--danger);margin-bottom:12px;font-weight:600}
.sheet-done{text-align:center;padding:20px 0}
.sheet-done-emoji{font-size:48px;margin-bottom:12px}
.sheet-done-title{font-size:18px;font-weight:700;color:var(--text-strong);margin-bottom:8px}
.sheet-done-sub{font-size:13px;color:var(--text-sub);margin-bottom:20px}
.sheet-done-btn{padding:12px 32px;border-radius:var(--radius-sm);background:var(--primary);color:#fff;font-size:14px;font-weight:700;display:inline-flex}

/* ── Stars ───────────────────────────────────── */
.stars{display:inline-flex;gap:2px;line-height:1}
.star{transition:.15s}
.star.on{color:var(--warn)}
.star.off{color:var(--border)}
.star.clickable{cursor:pointer}

/* ── 네비게이션 바 ───────────────────────────── */
.navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:var(--card);border-top:1px solid var(--divider);display:flex;z-index:100;padding:8px 0 14px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--text-mute);transition:.15s}
.nav-item.on{color:var(--primary)}
.nav-icon{display:flex;font-size:24px}
.nav-label{font-size:10px;font-weight:500;letter-spacing:-.01em}
.nav-item.on .nav-label{font-weight:700}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--primary);margin-top:2px;opacity:0;transition:.15s}
.nav-item.on .nav-dot{opacity:1}

/* ── 관리자 ───────────────────────────────────── */
.admin-login{background:var(--card);border-radius:var(--radius-lg);padding:24px;margin-top:16px;box-shadow:var(--shadow-sm)}
.admin-toolbar{display:flex;align-items:center;justify-content:space-between;margin:8px 0 16px}
.admin-tip{font-size:13px;color:var(--text-sub)}
.admin-refresh{font-size:13px;color:var(--primary);font-weight:600;display:inline-flex;align-items:center;gap:4px}
.req-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.req-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.req-title{font-size:14px;font-weight:700;color:var(--text-strong);letter-spacing:-.01em}
.req-meta{font-size:12px;color:var(--text-mute);margin-bottom:8px}
.req-field{background:var(--bg);border-radius:var(--radius-sm);padding:3px 8px;margin-right:6px;font-size:11px;font-weight:500}
.req-orig{font-size:12px;color:var(--text-sub);padding:8px 12px;background:var(--danger-soft);border-radius:var(--radius-sm);margin-bottom:6px;line-height:1.5}
.req-new{font-size:13px;color:var(--text);padding:8px 12px;background:var(--primary-soft);border-radius:var(--radius-sm);margin-bottom:8px;line-height:1.5}
.req-reason{font-size:12px;color:var(--text-sub);font-style:italic;margin-top:4px}
.req-actions{display:flex;gap:8px;margin-top:10px}
.req-btn{flex:1;height:38px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;gap:4px}
.req-btn.ok{background:var(--success)}
.req-btn.no{background:var(--danger)}
/* ── 카카오 로그인 ──────────────────────────── */
.login-card{background:var(--card);border-radius:var(--radius-lg);padding:24px 20px;margin-bottom:20px;box-shadow:var(--shadow-sm);text-align:center}
.login-card-title{font-size:16px;font-weight:700;color:var(--text-strong);margin-bottom:6px;letter-spacing:-.02em}
.login-card-sub{font-size:13px;color:var(--text-sub);margin-bottom:18px;line-height:1.55}
.kakao-btn{width:100%;height:52px;border-radius:var(--radius);background:#FEE500;color:#191919;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:-.02em;border:none;font-family:inherit}
.kakao-btn:active{background:#E8D200}
.profile-card{background:var(--card);border-radius:var(--radius-lg);padding:18px;margin-bottom:20px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:14px}
.profile-img{width:52px;height:52px;border-radius:50%;background:var(--bg);object-fit:cover;flex-shrink:0}
.profile-img-fallback{width:52px;height:52px;border-radius:50%;background:var(--primary-soft);color:var(--primary);font-size:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.profile-text{flex:1;min-width:0}
.profile-name{font-size:16px;font-weight:700;color:var(--text-strong);letter-spacing:-.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.profile-meta{font-size:12px;color:var(--text-mute);margin-top:2px}
.logout-btn{font-size:12px;padding:7px 12px;border-radius:var(--radius-pill);background:var(--bg);color:var(--text-sub);font-weight:600;flex-shrink:0}
.logout-btn:active{background:var(--border)}
.h-profile{width:32px;height:32px;border-radius:50%;background:var(--bg);object-fit:cover;cursor:pointer}
/* ── 환영 화면 (첫 진입) ─────────────────── */
.welcome{min-height:100vh;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;max-width:440px;margin:0 auto;text-align:center}
.welcome-emoji{font-size:72px;margin-bottom:24px;line-height:1}
.welcome-title{font-size:32px;font-weight:800;color:var(--text-strong);letter-spacing:-.03em;margin-bottom:12px}
.welcome-sub{font-size:15px;color:var(--text-sub);line-height:1.6;margin-bottom:40px}
.welcome-kakao{width:100%;max-width:320px}
.welcome-skip{margin-top:14px;font-size:13px;color:var(--text-mute);padding:10px 16px;background:none}
.welcome-skip:active{color:var(--text-sub)}

/* ════════════ Stage 2: 반응형 · 모션 · 이미지 · 토스트 ════════════ */

/* ── 반응형: 태블릿 / PC (모바일은 그대로, 넓은 화면만 확장) ── */
@media (min-width:768px){
  .app{max-width:680px}
  .navbar{max-width:680px;border-radius:18px 18px 0 0;box-shadow:0 -2px 16px rgba(0,0,0,.04)}
  .cat-grid{grid-template-columns:repeat(3,1fr);gap:16px}
}
@media (min-width:1100px){
  .app{max-width:760px}
  .navbar{max-width:760px}
  .cat-grid{grid-template-columns:repeat(4,1fr)}
}

/* ── 마이크로 인터랙션(누름 피드백) ── */
.recipe-card,.dish-row{transition:transform .12s ease, box-shadow .15s ease, background .12s ease}
.recipe-card:active{transform:scale(.985)}
.cat-card:active{transform:scale(.97)}
.dish-row:active{transform:scale(.99);background:var(--bg)}
.btn,.lang-btn,.edit-chip,.review-cta,.source-btn,.fav-cta,.sheet-done-btn{transition:transform .1s ease, background .15s ease, color .15s ease, box-shadow .15s ease}
.btn:active,.source-btn:active,.fav-cta:active,.sheet-done-btn:active{transform:scale(.97)}

/* ── 터치 타깃 ≥44px (접근성) ── */
.fav-btn{min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center}
.nav-item{min-height:48px;justify-content:center}
.lang-clear{min-height:30px;display:inline-flex;align-items:center}

/* ── 이미지: 카드 썸네일 (사진 없으면 이모지, assets/{id}.jpg 있으면 자동 표시) ── */
.recipe-row{display:flex;gap:12px;align-items:flex-start}
.recipe-row .recipe-body{padding-left:0;flex:1;min-width:0}
.recipe-thumb{width:58px;height:58px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;position:relative}
.recipe-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

/* ── 이미지: 상세 배너 (없으면 표시 안 함 — 기존 디자인 유지) ── */
.detail-photo{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:var(--radius);margin-bottom:14px;display:block}

/* ── 토스트 (alert 대체) ── */
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);z-index:300;max-width:88%;background:rgba(25,31,40,.94);color:#fff;font-size:14px;font-weight:600;padding:12px 18px;border-radius:999px;box-shadow:var(--shadow-lg);animation:toastin .25s cubic-bezier(.2,.8,.2,1);letter-spacing:-.01em;display:flex;align-items:center;gap:8px;white-space:nowrap;max-width:90%}
.toast-success{background:rgba(0,200,150,.96)}
.toast-error{background:rgba(240,68,82,.96)}
@keyframes toastin{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translate(-50%,0)}}

/* ── 스켈레톤 로딩 shimmer ── */
.skel{background:linear-gradient(100deg,var(--bg) 30%,#edf0f3 50%,var(--bg) 70%);background-size:200% 100%;animation:shimmer 1.15s infinite linear;border-radius:10px}
.skel-card{height:84px;margin-bottom:12px}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
</style>
